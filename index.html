<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cagan Capital — Multi-Asset Positioning Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{--bg:#060c14;--s1:#0c1824;--s2:#111f30;--s3:#182a3c;--bd:#1e3450;--bd2:#2a4468;--tx:#8a9bb0;--txd:#4a6278;--txb:#d0dcea;--up:#3a9fd8;--upb:rgba(58,159,216,0.07);--dn:#c44d5e;--dnb:rgba(196,77,94,0.07);--wn:#6e89a8;--wnb:rgba(110,137,168,0.07);--ac:#009CDC;--ac2:#005F9E;--mn:'JetBrains Mono','SF Mono',monospace;--sn:'Inter',-apple-system,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sn);background:var(--bg);color:var(--tx);min-height:100vh;padding:20px 28px;font-size:17px;-webkit-font-smoothing:antialiased;}
.hdr{padding:28px 0;margin-bottom:24px;border-bottom:1px solid var(--bd);}
.hdr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;}
.hdr h1{font-family:var(--mn);font-size:1.5em;font-weight:600;color:var(--txb);letter-spacing:1px;}
.hdr h1 b{color:var(--ac);}
.hdr-r{display:flex;align-items:center;gap:18px;}
.hdr-ts{font-family:var(--mn);font-size:0.78em;color:var(--txd);}
.live{font-family:var(--mn);font-size:0.75em;color:var(--up);display:flex;align-items:center;gap:5px;}
.live::before{content:'';width:7px;height:7px;background:var(--up);border-radius:50%;animation:pls 2s infinite;}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.btn{font-family:var(--mn);font-size:0.82em;padding:8px 18px;border:1px solid var(--bd);border-radius:6px;background:var(--s1);color:var(--txd);cursor:pointer;transition:.15s;}
.btn:hover{border-color:var(--ac);color:var(--tx);}
.disc{padding:12px 0;font-size:0.76em;color:var(--txd);line-height:1.5;margin-bottom:18px;border-bottom:1px solid var(--bd);}

/* Headlines banner */
.headlines{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.hl{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:28px 22px;text-align:center;}
.hl-period{font-family:var(--mn);font-size:0.78em;color:var(--txd);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
.hl-verdict{font-family:var(--mn);font-size:2.4em;font-weight:800;line-height:1.1;margin-bottom:10px;}
.hl-sub{font-size:0.88em;color:var(--txd);line-height:1.6;max-width:300px;margin:0 auto;}
.hl-score{font-family:var(--mn);font-size:0.82em;margin-top:12px;}
.c-up{color:var(--up);} .c-dn{color:var(--dn);} .c-wn{color:var(--wn);}
.bg-up{background:var(--upb);border-color:rgba(58,159,216,0.15);} .bg-dn{background:var(--dnb);border-color:rgba(196,77,94,0.16);} .bg-wn{background:var(--wnb);border-color:rgba(110,137,168,0.16);}

/* News ticker */
.news-section{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:22px 24px;margin-bottom:22px;}
.news-section h3{font-family:var(--mn);font-size:0.82em;color:var(--txd);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.news-section h3::before{content:'';display:inline-block;width:4px;height:14px;background:var(--ac);border-radius:2px;}
.news-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.025);}
.news-item:last-child{border-bottom:none;}
.news-dot{width:6px;height:6px;border-radius:50%;margin-top:8px;flex-shrink:0;}
.news-item a{color:var(--tx);text-decoration:none;font-size:0.9em;line-height:1.6;transition:.15s;}
.news-item a:hover{color:var(--ac);}
.news-item .news-src{font-family:var(--mn);font-size:0.68em;color:var(--txd);margin-top:3px;display:block;}
.news-loading{font-family:var(--mn);font-size:0.78em;color:var(--txd);opacity:.5;}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:22px;border-bottom:1px solid var(--bd);overflow-x:auto;}
.tab{font-family:var(--mn);font-size:0.88em;padding:14px 20px;border:none;background:none;color:var(--txd);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;}
.tab:hover{color:var(--tx);} .tab.active{color:var(--ac);border-bottom-color:var(--ac);}
.pane{display:none;} .pane.active{display:block;}

/* Sort controls */
.sort-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.sort-bar span{font-family:var(--mn);font-size:0.78em;color:var(--txd);text-transform:uppercase;letter-spacing:1px;}
.sort-btn{font-family:var(--mn);font-size:0.78em;padding:6px 14px;border:1px solid var(--bd);border-radius:5px;background:var(--s1);color:var(--txd);cursor:pointer;transition:.15s;}
.sort-btn:hover{border-color:var(--ac);color:var(--tx);}
.sort-btn.active{border-color:var(--ac);color:var(--ac);background:rgba(0,156,220,0.08);}
.sort-sep{width:1px;height:20px;background:var(--bd);margin:0 4px;}
.tf-btn,.sp-btn{font-family:var(--mn);font-size:0.78em;padding:6px 12px;border:1px solid var(--bd);border-radius:5px;background:var(--s1);color:var(--txd);cursor:pointer;transition:.15s;}
.tf-btn:hover,.sp-btn:hover{border-color:var(--ac2);color:var(--tx);}
.sp-btn.active{border-color:#3a9fd8;color:#3a9fd8;background:rgba(58,159,216,0.08);}
.tf-btn.active{border-color:var(--ac2);color:var(--ac2);background:rgba(0,95,158,0.08);}

/* Cards */
.g{display:grid;gap:16px;margin-bottom:20px;} .g2{grid-template-columns:repeat(auto-fit,minmax(360px,1fr));} .g3{grid-template-columns:repeat(3,1fr);} .g4{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
.c{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:20px;transition:all .35s ease;} .c:hover{border-color:var(--bd2);}
.c-title{font-family:var(--mn);font-size:0.82em;color:var(--txd);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:16px;}
.gauge{margin:14px 0 8px;} .gauge-track{width:100%;height:5px;background:linear-gradient(to right,var(--dn),var(--wn),var(--up));border-radius:3px;position:relative;}
.gauge-dot{width:12px;height:12px;background:var(--txb);border-radius:50%;position:absolute;top:-3.5px;transform:translateX(-50%);box-shadow:0 0 12px rgba(255,255,255,0.25);}
.gauge-lbl{display:flex;justify-content:space-between;font-family:var(--mn);font-size:0.68em;color:var(--txd);margin-top:5px;}
.ind{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.025);} .ind:last-child{border-bottom:none;}
.ind-n{font-size:0.9em;color:var(--txd);} .ind-v{font-family:var(--mn);font-size:0.9em;font-weight:500;}
.ind-s{font-family:var(--mn);font-size:0.76em;padding:4px 12px;border-radius:4px;font-weight:600;}
.su{background:var(--upb);color:var(--up);} .sd{background:var(--dnb);color:var(--dn);} .sn{background:var(--wnb);color:var(--wn);}

/* Overview */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
.ov{cursor:pointer;transition:all .4s ease;position:relative;overflow:hidden;} .ov:hover{border-color:var(--ac);background:var(--s2);transform:translateY(-2px);}
.ov-rank{position:absolute;top:10px;right:12px;font-family:var(--mn);font-size:0.68em;color:var(--txd);opacity:.5;}
.ov-nm{font-size:0.95em;color:var(--txd);margin-bottom:2px;} .ov-cat{font-family:var(--mn);font-size:0.68em;color:var(--txd);opacity:.5;}
.ov-px{font-family:var(--mn);font-size:1.8em;font-weight:700;margin:10px 0 6px;} .ov-ch{font-family:var(--mn);font-size:0.9em;font-weight:600;}
.ov-vd{font-family:var(--mn);font-size:0.76em;font-weight:700;margin-top:12px;padding:4px 12px;border-radius:4px;display:inline-block;}
.ov-bar{margin-top:10px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;}
.ov-bar-fill{height:100%;border-radius:2px;transition:width .6s;}
.ov-scores{display:flex;gap:8px;margin-top:8px;}
.ov-score-chip{font-family:var(--mn);font-size:0.68em;padding:2px 8px;border-radius:3px;background:var(--s3);color:var(--txd);}
.ov-score-chip.chip-active{background:rgba(0,95,158,0.12);color:var(--ac2);border:1px solid rgba(0,95,158,0.25);}

/* Implications Horizon Toggle */
.impl-hz-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.impl-hz-bar span{font-family:var(--mn);font-size:0.72em;color:var(--txd);text-transform:uppercase;letter-spacing:1px;}
.impl-hz-btn{font-family:var(--mn);font-size:0.72em;padding:5px 14px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--txd);cursor:pointer;transition:all .2s;}
.impl-hz-btn.active{background:var(--ac);color:#fff;border-color:var(--ac);}
/* Asset Class Filter */
.ac-filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.ac-btn{font-family:var(--mn);font-size:0.72em;padding:5px 14px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--txd);cursor:pointer;transition:all .2s;}
.ac-btn.active{background:var(--ac2);color:#fff;border-color:var(--ac2);}
/* Top Implications Banner */
.impl-banner{display:flex;flex-direction:column;gap:12px;margin-bottom:22px;}
.impl-card{display:flex;gap:16px;padding:18px 22px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;align-items:flex-start;transition:border-color .3s;}
.impl-card:hover{border-color:var(--ac);}
.impl-num{font-family:var(--mn);font-size:1.6em;font-weight:800;min-width:36px;line-height:1;}
.impl-body{flex:1;}
.impl-title{font-size:0.95em;font-weight:700;color:var(--txb);margin-bottom:4px;}
.impl-detail{font-size:0.85em;color:var(--txd);line-height:1.7;}
.impl-tags{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.impl-tag{font-family:var(--mn);font-size:0.65em;padding:2px 8px;border-radius:3px;font-weight:600;}

/* Leaders & Laggards Bar */
.ll-bar{display:flex;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.ll-section{flex:1;min-width:260px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;}
.ll-title{font-family:var(--mn);font-size:0.72em;color:var(--txd);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ll-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--s3);}
.ll-item:last-child{border-bottom:none;}
.ll-pos{font-family:var(--mn);font-size:0.72em;color:var(--txd);min-width:20px;}
.ll-name{font-size:0.88em;color:var(--txb);font-weight:600;flex:1;}
.ll-score{font-family:var(--mn);font-size:0.82em;font-weight:700;min-width:48px;text-align:right;}
.ll-bar-mini{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;max-width:80px;}
.ll-bar-fill-mini{height:100%;border-radius:3px;transition:width .5s;}
.ll-tf-bar{display:flex;gap:6px;margin-bottom:14px;}
.ll-tf-btn{font-family:var(--mn);font-size:0.72em;padding:4px 12px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--txd);cursor:pointer;transition:all .2s;}
.ll-tf-btn.active{background:var(--ac);color:#fff;border-color:var(--ac);}

/* Heatmap Overview Cards */
.hm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;}
.hm-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:18px 20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.hm-card:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.15);}
.hm-card.hm-expanded{grid-column:1/-1;border-color:var(--ac);}
.hm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hm-name{font-size:0.95em;font-weight:700;color:var(--txb);}
.hm-cat{font-family:var(--mn);font-size:0.65em;color:var(--txd);opacity:.6;}
.hm-px{font-family:var(--mn);font-size:1.1em;font-weight:700;}
.hm-ret{font-family:var(--mn);font-size:0.78em;font-weight:600;margin-left:6px;}
.hm-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px;}
.hm-cell{text-align:center;padding:10px 4px;border-radius:6px;transition:all .3s;}
.hm-cell-label{font-family:var(--mn);font-size:0.62em;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.hm-cell-score{font-family:var(--mn);font-size:1.1em;font-weight:800;color:#fff;}
.hm-cell-verdict{font-family:var(--mn);font-size:0.58em;color:rgba(255,255,255,0.8);margin-top:2px;letter-spacing:.5px;}
.hm-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--s3);}
.hm-expanded .hm-detail{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.hm-detail-item{text-align:center;}
.hm-detail-label{font-family:var(--mn);font-size:0.65em;color:var(--txd);margin-bottom:4px;}
.hm-detail-val{font-family:var(--mn);font-size:0.88em;font-weight:700;}
.hm-arrow{font-size:0.72em;color:var(--txd);transition:transform .3s;}
.hm-expanded .hm-arrow{transform:rotate(180deg);}
.hm-spark{width:100%;height:50px;border-radius:6px;margin-bottom:8px;display:block;pointer-events:none;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
.hm-pos-badge{display:inline-block;letter-spacing:.5px;}

/* Top Buys/Sells Banner */
.bs-wrap{display:flex;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.bs-section{flex:1;min-width:280px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:18px 22px;}
.bs-title{font-family:var(--mn);font-size:0.78em;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.bs-item{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--s3);}
.bs-item:last-child{border-bottom:none;}
.bs-rank{font-family:var(--mn);font-size:0.88em;font-weight:800;min-width:24px;}
.bs-info{flex:1;}
.bs-nm{font-size:0.92em;font-weight:700;color:var(--txb);}
.bs-cat2{font-family:var(--mn);font-size:0.62em;color:var(--txd);opacity:.6;}
.bs-score-wrap{text-align:right;min-width:70px;}
.bs-score-num{font-family:var(--mn);font-size:1.2em;font-weight:800;}
.bs-signal{font-family:var(--mn);font-size:0.62em;font-weight:700;padding:2px 8px;border-radius:3px;display:inline-block;margin-top:2px;}

/* Asset detail */
.ah{display:flex;align-items:baseline;gap:18px;margin-bottom:18px;flex-wrap:wrap;}
.ah-px{font-family:var(--mn);font-size:2.6em;font-weight:700;color:var(--txb);} .ah-ch{font-family:var(--mn);font-size:0.95em;font-weight:600;}
.vd{text-align:center;padding:24px 20px;}
.vd-lb{font-family:var(--mn);font-size:0.78em;color:var(--txd);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.vd-val{font-family:var(--mn);font-size:1.9em;font-weight:800;margin-bottom:6px;}
.vd-sc{font-family:var(--mn);font-size:0.82em;color:var(--txd);}

/* Portfolio */
.port-section{margin-bottom:22px;}
.port-controls{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:24px;margin-bottom:20px;}
.ctrl-title{font-family:var(--mn);font-size:0.88em;color:var(--txb);font-weight:600;margin-bottom:18px;text-transform:uppercase;letter-spacing:1px;}
.ctrl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:18px;}
.ctrl-group{display:flex;flex-direction:column;gap:8px;}
.ctrl-label{font-family:var(--mn);font-size:0.78em;color:var(--txd);display:flex;justify-content:space-between;align-items:center;}
.ctrl-label span{color:var(--ac);font-weight:600;}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;background:var(--s3);border-radius:3px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--ac);border-radius:50%;cursor:pointer;border:2px solid var(--bg);}
input[type=range]::-moz-range-thumb{width:18px;height:18px;background:var(--ac);border-radius:50%;cursor:pointer;border:2px solid var(--bg);}
.asset-toggles{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.asset-toggle{font-family:var(--mn);font-size:0.78em;padding:6px 14px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--txd);cursor:pointer;transition:.15s;user-select:none;}
.asset-toggle.active{border-color:var(--ac);color:var(--ac);background:rgba(0,156,220,0.08);}
.asset-toggle:hover{border-color:var(--bd2);}
.btn-optimize{font-family:var(--mn);font-size:0.88em;padding:12px 30px;border:1px solid var(--ac);border-radius:6px;background:rgba(0,156,220,0.1);color:var(--ac);cursor:pointer;font-weight:600;transition:.15s;margin-top:14px;}
.btn-optimize:hover{background:rgba(0,156,220,0.2);}
.port-horizon{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:26px;margin-bottom:18px;}
.port-horizon-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:14px;}
.ph-left h3{font-family:var(--mn);font-size:1.15em;color:var(--txb);font-weight:700;margin-bottom:5px;}
.ph-left .ph-sub{font-size:0.85em;color:var(--txd);}
.ph-verdict{text-align:right;}
.ph-verdict-val{font-family:var(--mn);font-size:2.1em;font-weight:800;}
.ph-verdict-sc{font-family:var(--mn);font-size:0.82em;color:var(--txd);}
.port-viz{display:grid;grid-template-columns:200px 1fr;gap:26px;align-items:start;}
.port-donut{height:200px;width:200px;}
.bar-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.025);}
.bar-row:last-child{border-bottom:none;}
.bar-name{font-family:var(--mn);font-size:0.9em;color:var(--txd);min-width:55px;}
.bar-wrap{flex:1;height:30px;background:var(--s3);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;transition:width .5s;min-width:42px;}
.bar-pct-inner{font-family:var(--mn);font-size:0.76em;font-weight:700;color:rgba(0,0,0,0.7);}
.bar-pct{font-family:var(--mn);font-size:0.95em;font-weight:700;min-width:65px;text-align:right;}
.bar-score{font-family:var(--mn);font-size:0.76em;min-width:55px;text-align:right;}
.port-narr{margin-top:18px;padding:18px 20px;background:var(--s2);border-radius:8px;border:1px solid var(--bd);font-size:0.92em;color:var(--tx);line-height:1.85;}
.port-narr b{color:var(--txb);}

/* Narrative */
.narr-wrap{max-width:1000px;margin:0 auto;}
.narr-section{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:30px 30px 26px;margin-bottom:20px;}
.narr-section h2{font-family:var(--mn);font-size:1.1em;color:var(--txb);font-weight:700;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:1px;}
.narr-section h3{font-family:var(--mn);font-size:0.92em;color:var(--ac);font-weight:600;margin:20px 0 10px;letter-spacing:.5px;}
.narr-section p{font-size:0.95em;color:var(--tx);line-height:1.9;margin-bottom:14px;}
.narr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:14px;}
.narr-asset{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:18px;}

const PX=[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`];

async function fwf(url,lb){for(let i=0;i<PX.length;i++){try{stat(`${lb} [${i+1}/${PX.length}]`);const r=await fetch(PX[i](url),{signal:AbortSignal.timeout(15000)});if(!r.ok)continue;const t=await r.text();if(!t||t.length<50)continue;return t;}catch(e){console.warn(`px${i+1} fail`,lb,e.message);}}throw new Error(`failed: ${lb}`);}

async function fy(s,rng='1y',itv='1d'){const us=[`https://query1.finance.yahoo.com/v8/finance/chart/${s}?range=${rng}&interval=${itv}&includePrePost=false`,`https://query2.finance.yahoo.com/v8/finance/chart/${s}?range=${rng}&interval=${itv}&includePrePost=false`];let er;for(const u of us){try{const d=await fwfJSON(u,s),r=d.chart.result[0],q=r.indicators.quote[0];return{meta:r.meta,dates:(r.timestamp||[]).map(t=>new Date(t*1000)),open:q.open,high:q.high,low:q.low,close:q.close,volume:q.volume};}catch(e){er=e;}}throw er;}

// === NEWS FETCHING via Google News RSS ===
async function fetchNews(query, count=5) {
  const url = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=en-US&gl=US&ceid=US:en`;
  try {
    const txt = await fwf(url, 'news:'+query.slice(0,15));
    const parser = new DOMParser();
    const doc = parser.parseFromString(txt, 'text/xml');
    const items = doc.querySelectorAll('item');
    const results = [];
    for (let i = 0; i < Math.min(items.length, count); i++) {
      const it = items[i];
      const title = it.querySelector('title')?.textContent || '';
      const link = it.querySelector('link')?.textContent || '';
      const pubDate = it.querySelector('pubDate')?.textContent || '';
      const source = it.querySelector('source')?.textContent || '';
      if (title) results.push({title, link, pubDate, source});
    }
    return results;
  } catch(e) { console.warn('news fetch fail:', query, e); return []; }

// Technicals
function sma(d,p){const r=[];for(let i=0;i<d.length;i++){if(i<p-1){r.push(null);continue;}let s=0;for(let j=i-p+1;j<=i;j++)s+=d[j];r.push(s/p);}return r;}
function ema(d,p){const r=[],k=2/(p+1);let pv=null;for(let i=0;i<d.length;i++){if(d[i]==null){r.push(null);continue;}if(pv===null){if(i>=p-1){let s=0;for(let j=i-p+1;j<=i;j++)s+=d[j];pv=s/p;r.push(pv);}else r.push(null);}else{pv=d[i]*k+pv*(1-k);r.push(pv);}}return r;}
function calcRsi(c,p=14){const r=[];let g=0,l=0;for(let i=0;i<c.length;i++){if(!i){r.push(null);continue;}const ch=c[i]-c[i-1];if(i<=p){if(ch>0)g+=ch;else l-=ch;if(i===p){g/=p;l/=p;r.push(100-100/(1+(l===0?100:g/l)));}else r.push(null);}else{const gn=ch>0?ch:0,ln=ch<0?-ch:0;g=(g*(p-1)+gn)/p;l=(l*(p-1)+ln)/p;r.push(100-100/(1+(l===0?100:g/l)));}}return r;}
function calcMacd(c){const e12=ema(c,12),e26=ema(c,26),ml=e12.map((v,i)=>(v!=null&&e26[i]!=null)?v-e26[i]:null),f=ml.filter(v=>v!==null),sg=ema(f,9),pd=[];let ix=0;for(let i=0;i<ml.length;i++){if(ml[i]===null)pd.push(null);else{pd.push(ix<sg.length?sg[ix]:null);ix++;}}return{ml,sg:pd};}
function calcBb(c,p=20,m=2){const mid=sma(c,p),u=[],l=[];for(let i=0;i<c.length;i++){if(mid[i]==null){u.push(null);l.push(null);continue;}let ss=0;for(let j=i-p+1;j<=i;j++)ss+=(c[j]-mid[i])**2;const sd=Math.sqrt(ss/p);u.push(mid[i]+m*sd);l.push(mid[i]-m*sd);}return{u,mid,l};}
function calcStoch(h,l,c,p=14){const r=[];for(let i=0;i<c.length;i++){if(i<p-1){r.push(null);continue;}let hi=-Infinity,lo=Infinity;for(let j=i-p+1;j<=i;j++){if(h[j]>hi)hi=h[j];if(l[j]<lo)lo=l[j];}const rg=hi-lo;r.push(rg===0?50:((c[i]-lo)/rg)*100);}return r;}

function analyze(data, sentType, vix, t10y, t3m, fg, dxyData, spxData) {
  const cl=data.close.filter(v=>v!=null),hi=data.high.filter(v=>v!=null),lo=data.low.filter(v=>v!=null),vol=data.volume.filter(v=>v!=null),n=cl.length;
  if(n<30)return null;const px=cl[n-1];
  const s20=sma(cl,20),s50=sma(cl,50),s200=sma(cl,Math.min(200,n-1)),rsiA=calcRsi(cl),macdR=calcMacd(cl),bbR=calcBb(cl),stK=calcStoch(hi,lo,cl);
  const cRSI=rsiA[n-1],cMACD=macdR.ml[n-1],cSig=macdR.sg[n-1],cStoch=stK[n-1],bbU=bbR.u[n-1],bbL=bbR.l[n-1],bbP=(bbU&&bbL)?(px-bbL)/(bbU-bbL)*100:50;
  const a20=px>(s20[n-1]||0),a50=px>(s50[n-1]||0),a200=px>(s200[n-1]||0),gc=(s50[n-1]||0)>(s200[n-1]||0);
  const rt=d=>n>d?(px-cl[n-1-d])/cl[n-1-d]*100:null;
  const r1w=rt(5),r1m=rt(22),r3m=rt(63),r6m=rt(126),r1y=rt(250),r3y=rt(750),r5y=rt(1250),r10y=rt(2500);
  const v20=sma(vol,20),vr=v20[n-1]?vol[n-1]/v20[n-1]:1;
  const tech=[],mac=[],sen=[];
  tech.push({n:'SMA 20',v:s20[n-1]?.toFixed(1),s:a20?1:-1});
  tech.push({n:'SMA 50',v:s50[n-1]?.toFixed(1),s:a50?1:-1});
  if(n>200){tech.push({n:'SMA 200',v:s200[n-1]?.toFixed(1),s:a200?1:-1});tech.push({n:'50/200',v:gc?'Golden':'Death',s:gc?1:-1});}
  let rs=0;if(cRSI>70)rs=-1;else if(cRSI>60)rs=-.3;else if(cRSI<30)rs=1;else if(cRSI<40)rs=.3;tech.push({n:'RSI',v:cRSI?.toFixed(1),s:rs});
  tech.push({n:'MACD',v:cMACD?.toFixed(2),s:(cMACD!=null&&cSig!=null)?(cMACD>cSig?.7:-.7):0});
  let stS=0;if(cStoch>80)stS=-.7;else if(cStoch<20)stS=.7;else stS=cStoch>50?.3:-.3;tech.push({n:'Stoch',v:cStoch?.toFixed(1),s:stS});

function optimize(results,scoreKey,maxWt,minWt,excluded){const items=ASSETS.filter(a=>results[a.id]&&!excluded.has(a.id)).map(a=>({id:a.id,name:a.short,fullName:a.name,color:a.color,cat:a.cat,score:results[a.id][scoreKey]}));if(!items.length)return{allocs:[],exp:0};const shifted=items.map(it=>({...it,exp:Math.exp(it.score*3)}));const totE=shifted.reduce((s,it)=>s+it.exp,0);let wts=shifted.map(it=>({...it,w:it.exp/totE}));for(let iter=0;iter<30;iter++){let changed=false;wts.forEach(w=>{if(w.w>maxWt){w.w=maxWt;changed=true;}});if(minWt>0&&items.length*minWt<=1){wts.forEach(w=>{if(w.w<minWt){w.w=minWt;changed=true;}});}if(!changed)break;const tot=wts.reduce((s,w)=>s+w.w,0);wts=wts.map(w=>({...w,w:w.w/tot}));}const tot=wts.reduce((s,w)=>s+w.w,0);wts=wts.map(w=>({...w,w:w.w/tot}));return{allocs:wts.sort((a,b)=>b.w-a.w),exp:wts.reduce((s,w)=>s+w.w*w.score,0)};}

// Helpers
function vL(s){if(s>1.5)return{l:'STRONG ADD',c:'c-up',bg:'bg-up'};if(s>0.5)return{l:'ADD',c:'c-up',bg:'bg-up'};if(s>-0.5)return{l:'NEUTRAL',c:'c-wn',bg:'bg-wn'};if(s>-1.5)return{l:'REDUCE',c:'c-dn',bg:'bg-dn'};return{l:'STRONG REDUCE',c:'c-dn',bg:'bg-dn'};}
function headline(s,period,tf,topA,botA){const v=vL(s);const pct='z: '+s.toFixed(2);const tA=(topA||[]).slice(0,2).join(', '),bA=(botA||[]).slice(0,2).join(', ');const isTac=tf==='wk',isNT=tf==='mo',isAnn=tf==='yr',isSec=['y3','y5','y10'].includes(tf);let sub='';if(s>1.5){if(isTac)sub=`This week: add ${tA} with conviction. Broad momentum — ${period} signals strongly aligned.`;else if(isNT)sub=`Near-term: overweight ${tA}, fund from ${bA}. ${period} composite deeply positive.`;else if(isAnn)sub=`Annual outlook: favor ${tA} as core holdings. Cut ${bA} — structural weakness.`;else sub=`Secular view: ${tA} are generational positions. Size up and hold through vol.`;}else if(s>0.5){if(isTac)sub=`This week: selectively add ${tA||'top-ranked names'} on pullbacks. Momentum is constructive.`;else if(isNT)sub=`Near-term: ${tA} offer the best risk/reward. Avoid ${bA} — negative edge.`;else if(isAnn)sub=`Annual: ${tA} are the overweights. Trim ${bA} and reallocate. Patience over aggression.`;else sub=`Secular tilt toward ${tA}. Multi-year thesis developing — accumulate on weakness.`;}else if(s>-0.5){if(isTac)sub=`This week: no clear tactical edge. Hold current positions — wait for a catalyst before acting.`;else if(isNT)sub=`Near-term: mixed signals. Only ${tA||'top name'} warrants fresh capital. Cash is alpha.`;else if(isAnn)sub=`Annual: no directional conviction. Strategic patience — redeploy only when regime clarifies.`;else sub=`Secular: no clear multi-year trend. Maintain diversified core. Avoid concentration risk.`;}else if(s>-1.5){if(isTac)sub=`This week: reduce ${bA}. Momentum fading — hedge or raise cash tactically.`;else if(isNT)sub=`Near-term headwinds building. Cut ${bA}; only ${tA||'relative strength'} offers shelter.`;else if(isAnn)sub=`Annual: headwinds warrant de-risking. Underweight ${bA}, overweight defensives only.`;else sub=`Secular de-risk. Multi-year headwinds in ${bA}. Shift toward capital preservation.`;}else{if(isTac)sub=`This week: sell ${bA} aggressively. Capital preservation is the only trade.`;else if(isNT)sub=`Near-term: defensive positioning. Sell ${bA}, raise cash. Wait for weekly to stabilize.`;else if(isAnn)sub=`Annual: significant downside risk. Cut ${bA} and move to short duration and cash.`;else sub=`Secular bear signal. Generational de-risk — sell ${bA}, extend duration, and hold cash.`;}return{...v,sub,pct};}

// Synthesize news: dedupe, cluster by theme, produce punchy takeaways linked to best source
function synthesizeNews(news, context) {
  if (!news || !news.length) return [];
  // Keyword extraction helper
  const kw = t => t.toLowerCase().replace(/[^a-z0-9 ]/g,'').split(/\s+/).filter(w=>w.length>3);
  // Remove near-duplicate titles (Jaccard > 0.5)
  const deduped = []; const seen = [];
  for (const n of news) {
    const words = new Set(kw(n.title));
    const isDup = seen.some(s => { const inter = [...words].filter(w=>s.has(w)).length; return inter / Math.min(words.size, s.size) > 0.5; });
    if (!isDup) { deduped.push(n); seen.push(words); }
  }
  // Theme-cluster keywords
  const themes = {
    rates: /\b(rate|yield|treasury|fed|fomc|hike|cut|hawkish|dovish|inflation|cpi|ppi)\b/i,
    earnings: /\b(earnings|revenue|profit|eps|guidance|beat|miss|quarter|report)\b/i,
    risk: /\b(crash|sell.?off|correction|bear|recession|fear|panic|volatil|vix|risk)\b/i,
    rally: /\b(rally|surge|soar|bull|record|high|gain|breakout|momentum|boom)\b/i,
    geopolitics: /\b(war|sanction|tariff|trade|china|russia|ukraine|middle east|geopolit|opec)\b/i,
    crypto: /\b(bitcoin|crypto|ethereum|token|blockchain|defi|btc|eth)\b/i,
    commodities: /\b(gold|silver|oil|wheat|commodity|metal|copper|uranium)\b/i,
    tech: /\b(tech|ai|semiconductor|chip|nvidia|apple|microsoft|google|meta)\b/i,
  };
  // Assign each article a theme
  const tagged = deduped.map(n => {
    let theme = 'market';
    for (const [k, rx] of Object.entries(themes)) { if (rx.test(n.title)) { theme = k; break; } }
    return { ...n, theme };
  });
  // Group by theme, pick best article per theme, synthesize takeaway
  const groups = {};
  tagged.forEach(n => { if (!groups[n.theme]) groups[n.theme] = []; groups[n.theme].push(n); });
  const results = [];
  for (const [theme, articles] of Object.entries(groups)) {
    // Pick freshest article as primary link
    const best = articles.sort((a,b) => new Date(b.pubDate||0) - new Date(a.pubDate||0))[0];
    // Synthesize a takeaway from the cluster
    let takeaway = '';
    const titles = articles.map(a => a.title);
    const allText = titles.join(' ').toLowerCase();
    if (theme === 'rates') {
      const dovish = /cut|dovish|lower|ease/i.test(allText);
      const hawkish = /hike|hawkish|higher|tighten/i.test(allText);
      takeaway = `Rates & Fed: ${dovish?'Dovish signals':''}${dovish&&hawkish?' vs ':''}${hawkish?'hawkish pressure':''}${!dovish&&!hawkish?'Rate policy in focus':''} — ${articles.length > 1 ? articles.length+' stories tracking ' : ''}yield and monetary policy implications for risk assets.`;
    } else if (theme === 'earnings') {
      const beats = /beat|strong|surpass/i.test(allText);
      takeaway = `Earnings season: ${beats?'Upside surprises':'Results'} in focus — ${context?context+' ':' '}sentiment driven by corporate profit trajectory.`;
    } else if (theme === 'risk') {
      takeaway = `Risk-off signals: Headlines flagging market stress — monitor for volatility expansion and defensive rotation.`;
    } else if (theme === 'rally') {
      takeaway = `Momentum building: Markets posting gains with positive breadth — ${articles.length > 1 ? 'multiple catalysts' : 'key catalyst'} driving risk appetite higher.`;
    } else if (theme === 'geopolitics') {
      takeaway = `Geopolitical risk: ${/tariff|trade/i.test(allText)?'Trade policy uncertainty':'Global tensions'} adding a risk premium — watch for spillover into commodities and safe havens.`;
    } else if (theme === 'crypto') {
      takeaway = `Crypto: ${/surge|rally|high/i.test(allText)?'Digital assets gaining':'Crypto market moving'} — ${/regulation|sec|ban/i.test(allText)?'regulatory headlines in play.':'sentiment and flows driving price action.'}`;
    } else if (theme === 'commodities') {
      takeaway = `Commodities: ${/gold|silver/i.test(allText)?'Precious metals':'Hard assets'} in the spotlight — ${/surge|rally|high/i.test(allText)?'strength':'price action'} reflecting ${/dollar|usd/i.test(allText)?'USD dynamics':'supply-demand shifts'}.`;
    } else if (theme === 'tech') {
      takeaway = `Tech & AI: ${/ai/i.test(allText)?'AI narrative':'Technology sector'} driving market attention — ${/nvidia|chip|semi/i.test(allText)?'semiconductor supply chain':'mega-cap moves'} setting the tone.`;
    } else {
      // Generic market
      if (articles.length >= 2) {
        takeaway = `Market pulse: ${articles.length} stories on broad market dynamics — cross-asset flows and macro positioning dominate.`;
      } else {
        // Single generic article — create a tight summary from the title
        const t = best.title;
        takeaway = t.length > 80 ? t.slice(0, 77) + '...' : t;
      }
    }
    const ago = best.pubDate ? (() => { const d = new Date(best.pubDate), ms = Date.now() - d.getTime(), h = Math.floor(ms/3600000); return h < 1 ? 'just now' : h < 24 ? h+'h ago' : Math.floor(h/24)+'d ago'; })() : '';
    results.push({ takeaway, link: best.link, source: best.source, ago, theme, count: articles.length });
  }
  // Sort: multi-article clusters first, then by recency
  results.sort((a,b) => b.count - a.count || (b.ago === 'just now' ? 1 : 0) - (a.ago === 'just now' ? 1 : 0));
  return results;
}

function renderNewsHTML(news, dotColor, context) {
  if (!news || !news.length) return '<div class="news-loading">Loading headlines...</div>';
  const synth = synthesizeNews(news, context);
  if (!synth.length) return '<div class="news-loading">No headlines available.</div>';
  const themeIcons = {rates:'📊',earnings:'📈',risk:'⚠️',rally:'🚀',geopolitics:'🌐',crypto:'₿',commodities:'🥇',tech:'💻',market:'📰'};
  return synth.slice(0, 5).map(s => {
    const icon = themeIcons[s.theme] || '📰';

  if(ycInd&&parseFloat(ycInd.v)<0)riskFlags.push(`<b>Yield curve inverted</b> at ${ycInd.v}. Recession signal historically.`);
  if(fgInd){const fg=parseFloat(fgInd.v);if(fg>80)riskFlags.push(`<b>Extreme Greed</b> (${fgInd.v}). Contrarian caution — crowded positioning.`);if(fg<20)riskFlags.push(`<b>Extreme Fear</b> (${fgInd.v}). Contrarian opportunity.`);}
  if(riskFlags.length){
    html+=`<div class="narr-section"><h2>Risk Flags</h2>`;
    riskFlags.forEach(r=>{html+=`<p style="color:var(--dn);">${r}</p>`;});
    html+=`</div>`;
  }

  // ═══ 6. NEWS SYNTHESIS ═══
  const mktNews=allNews._market||[];
  const allAssetNews=available.flatMap(a=>(allNews[a.id]||[]).map(n=>({...n,asset:a})));
  const allNewsArr=[...mktNews,...allAssetNews];
  if(allNewsArr.length){
    const synth=synthesizeNews(allNewsArr,'cross-asset');
    html+=`<div class="narr-section"><h2>News & Sentiment Synthesis</h2>`;
    html+=`<p style="color:var(--txd);font-size:0.88em;margin-bottom:12px;">Key themes from ${allNewsArr.length} headlines — synthesized into ${frame.toLowerCase()} positioning implications.</p>`;
    synth.slice(0,6).forEach(s=>{
      html+=`<div style="margin-bottom:10px;padding:10px 14px;background:var(--s3);border-radius:6px;border-left:3px solid var(--ac);">
        <p style="font-size:0.92em;font-weight:600;margin-bottom:4px;">${s.takeaway}</p>
        <span style="font-family:var(--mn);font-size:0.7em;color:var(--txd);">${s.theme.toUpperCase()} · ${s.source}${s.count>1?' + '+(s.count-1)+' related':''}${s.ago?' · '+s.ago:''} · <a href="${s.link}" target="_blank" rel="noopener" style="color:var(--ac);">source</a></span>
      </div>`;
    });
    html+=`</div>`;
  }

  // ═══ 7. BOTTOM LINE ═══
  html+=`<div class="narr-section"><h2>Bottom Line — ${frame}</h2>
    <p style="font-size:1.05em;line-height:1.85;">Weight of evidence ${horizon}: <b class="${vc(avgTF)}">${regime}</b>. ${avgTF>0.55?`Add risk. Lead with ${topAdds.join(', ')}. Cut ${topCuts.join(', ')} to fund winners. ${isStrategic?'Strategic overweight justified — size for the cycle.':'Add on pullbacks, trail stops higher.'}`:avgTF>-0.5?`The trade is ${topAdds[0]} over ${topCuts[0]} — express the spread. ${topAdds[1]?topAdds[1]+' is the secondary add. ':''}${isStrategic?'Accumulate '+topAdds[0]+' on weakness over the period.':'Size the pair trade for the conviction level and tighten stops on underweights.'}`:`Reduce exposure. Sell ${topCuts.join(', ')}. The only relative strength is ${topAdds.slice(0,2).join(', ')} — own these as hedges, not conviction positions. ${isStrategic?'Structural de-risking warranted — raise cash allocation above normal.':'Wait for weekly to confirm a turn before adding risk.'}`}</p>
    <p style="font-style:italic;color:var(--txd);margin-top:12px;">Algorithmically generated from ${available.length} assets · ${frame} horizon · Not financial advice</p>
    <div class="narr-ts">Generated: ${ts}</div></div>`;
  html+='</div>';
  return html;
}

function buildTopImplications(results,tf){
  tf=tf||'mo';
  const tfLabels={wk:'this week',mo:'this month',yr:'this year',y3:'over 3 years',y5:'over 5 years',y10:'over a decade'};
  const tfFrame={wk:'Tactical',mo:'Near-Term',yr:'Annual',y3:'Secular',y5:'Structural',y10:'Generational'};
  const tfLabel=tfLabels[tf]||'this month';
  const frame=tfFrame[tf]||'Near-Term';
  const isTactical=tf==='wk';const isStrategic=tf==='yr'||tf==='y3'||tf==='y5'||tf==='y10';
  const fp2=v=>v==null?'—':(v>=0?'+':'')+v.toFixed(1)+'%';
  const candidates=[];
  const available=ASSETS.filter(a=>results[a.id]);
  const avgTF=available.reduce((s,a)=>s+results[a.id][tf],0)/available.length;
  const byTF=[...available].sort((a,b)=>results[b.id][tf]-results[a.id][tf]);
  const topNames=byTF.slice(0,3).map(a=>a.short);
  const botNames=byTF.slice(-3).reverse().map(a=>a.short);
  const bullN=available.filter(a=>results[a.id][tf]>0.75).length;
  const bearN=available.filter(a=>results[a.id][tf]<-0.75).length;

  // ── 1. Regime Call — always #1, uses top/bottom ranked assets ──
  let regTitle,regDetail,regColor;
  const tacLang=isTactical;const ntLang=tf==='mo';const annLang=tf==='yr';const secLang=isStrategic&&!annLang;
  if(avgTF>1.0){
    regTitle=`${frame} Thesis: Risk-On — Favor ${topNames.join(', ')}`;
    regDetail=tacLang?`This week's cross-asset composite z: ${avgTF.toFixed(2)} — ${bullN}/${available.length} in add territory. Lead with ${topNames[0]}, trim ${botNames[0]}. Momentum is broad — be fully invested.`
      :ntLang?`Near-term composite z: ${avgTF.toFixed(2)} — ${bullN} add signals across ${available.length} assets. Overweight ${topNames[0]} as the core position. Fund by reducing ${botNames[0]}.`
      :annLang?`Annual composite z: ${avgTF.toFixed(2)} — structurally positive. Build core positions in ${topNames.join(', ')}. Underweight ${botNames[0]} — secular weakness.`
      :`Multi-year composite z: ${avgTF.toFixed(2)}. ${topNames[0]} is a generational overweight. Size the position for the cycle, not the quarter. Cut ${botNames[0]} permanently.`;
    regColor='var(--up)';}
  else if(avgTF>0.25){
    regTitle=`${frame} Thesis: Selective — OW ${topNames[0]}, UW ${botNames[0]}`;
    regDetail=tacLang?`Composite modestly positive (z ${avgTF.toFixed(2)}). ${topNames[0]} is this week's best tactical add. Avoid ${botNames[0]}. Don't chase — size for risk.`
      :ntLang?`Monthly composite z: ${avgTF.toFixed(2)}. Best near-term risk/reward in ${topNames[0]}; weakest setup in ${botNames[0]}. Remain disciplined with position sizing.`
      :annLang?`Annual composite z: ${avgTF.toFixed(2)}. Selectively overweight ${topNames[0]} for the year. ${botNames[0]} is the underweight — structural headwinds persist.`
      :`Secular tilt positive (z ${avgTF.toFixed(2)}). Accumulate ${topNames[0]} on pullbacks over the coming years. Avoid ${botNames[0]} — the multi-year trend is working against it.`;
    regColor='var(--up)';}
  else if(avgTF>-0.5){
    regTitle=`${frame} Thesis: Pair Trade — Buy ${topNames[0]}, Sell ${botNames[0]}`;
    regDetail=tacLang?`${bullN} add vs ${bearN} reduce this week. The edge is relative: buy ${topNames[0]} (z ${results[byTF[0].id][tf].toFixed(2)}), sell ${botNames[0]} (z ${results[byTF[byTF.length-1].id][tf].toFixed(2)}). ${topNames[1]?topNames[1]+' is a secondary tactical add.':''}`
      :ntLang?`${bullN} add vs ${bearN} reduce across ${available.length} assets. Express via pairs: overweight ${topNames[0]}, underweight ${botNames[0]}. ${topNames[1]?topNames[1]+' offers additional relative value.':''}`
      :annLang?`Annual signals mixed (${bullN} add, ${bearN} reduce). The opportunity is dispersion: build ${topNames[0]} as a core overweight, fund from ${botNames[0]}. Rotate into ${topNames[1]||topNames[0]} on pullbacks.`
      :`Secular dispersion trade (z ${avgTF.toFixed(2)}). Accumulate ${topNames[0]} as a multi-year core holding. Structurally underweight ${botNames[0]} — the cycle is working against it.`;
    regColor='var(--wn)';}
  else{
    regTitle=`${frame} Thesis: Defensive — Reduce ${botNames.join(', ')}`;
    regDetail=tacLang?`${bearN}/${available.length} flashing reduce this week. Raise cash, tighten stops on ${botNames.join(', ')}. ${topNames.slice(0,2).join(', ')} only relative strength.`
      :ntLang?`${bearN}/${available.length} flashing reduce signals. Prioritize capital preservation this month. Trim ${botNames.join(', ')}. Relative strength only in ${topNames.slice(0,2).join(', ')}.`
      :annLang?`Annual headwinds building — ${bearN} reduce signals. De-risk systematically. Underweight ${botNames.join(', ')} and move to shorter duration.`
      :`Secular bear regime (z ${avgTF.toFixed(2)}). Multi-year de-risk warranted. Sell ${botNames.join(', ')} and extend cash allocation. Only ${topNames[0]} provides structural shelter.`;
    regColor='var(--dn)';}
  candidates.push({title:regTitle,detail:regDetail,color:regColor,
    tags:[{l:bullN+' add',c:'rgba(58,159,216,0.15)',tc:'var(--up)'},{l:bearN+' reduce',c:'rgba(196,77,94,0.12)',tc:'var(--dn)'}],urgency:10,assetIds:new Set(byTF.slice(0,3).concat(byTF.slice(-3)).map(a=>a.id))});

  // ── 2. Asset-class group insights (pick the MOST interesting one) ──
  const AC_GROUPS=[
    {name:'Equities',ids:['sp500','iwm','eem','efa','vug','vtv','vym','vymi','acwx'],color:'var(--ac)',bg:'rgba(0,156,220,0.12)'},
    {name:'Fixed Income',ids:['agg','tlt','vgsh','bndx','lqd'],color:'var(--wn)',bg:'rgba(110,137,168,0.12)'},
    {name:'Commodities',ids:['gld','slv','weat','uso','copx','sil'],color:'#7a9ab8',bg:'rgba(122,154,184,0.12)'},
    {name:'Crypto',ids:['ibit','etha'],color:'#5889b0',bg:'rgba(88,137,176,0.12)'},
    {name:'FX/Thematic',ids:['dxy','arkk'],color:'#005F9E',bg:'rgba(0,95,158,0.12)'}
  ];
  const acInsights=[];
  AC_GROUPS.forEach(grp=>{
    const gIds=grp.ids.filter(id=>results[id]);if(gIds.length<1)return;
    const avg=gIds.reduce((s,id)=>s+results[id][tf],0)/gIds.length;
    const best=gIds.reduce((b,id)=>results[id][tf]>results[b][tf]?id:b,gIds[0]);
    const worst=gIds.reduce((w,id)=>results[id][tf]<results[w][tf]?id:w,gIds[0]);
    const bestA=ASSETS.find(a=>a.id===best),worstA=ASSETS.find(a=>a.id===worst);
    const spread=gIds.length>1?results[best][tf]-results[worst][tf]:0;
    // Score this insight by how extreme or interesting it is
    const interest=Math.abs(avg)*2 + (spread>1.5?1.5:0) + (gIds.some(id=>Math.abs(results[id][tf])>1.8)?1:0);
    let title,detail;
    const hzLbl=tacLang?'this week':ntLang?'this month':annLang?'this year':frame.toLowerCase()+' horizon';
    if(Math.abs(avg)>0.75){
      title=avg>0?`${grp.name}: Overweight ${bestA.short} (z ${results[best][tf].toFixed(2)})`:`${grp.name}: Underweight — Cut ${worstA.short}`;
      if(avg>0){
        detail=tacLang?`${grp.name} composite z: ${avg.toFixed(2)} this week. ${bestA.short} is the tactical leader at z ${results[best][tf].toFixed(2)}. ${spread>1.0?'Spread vs '+worstA.short+' (z '+results[worst][tf].toFixed(2)+') creates a pair trade.':'Add across the group.'}`
          :ntLang?`${grp.name} composite z: ${avg.toFixed(2)}. ${bestA.short} is our top near-term pick at z ${results[best][tf].toFixed(2)}. ${spread>1.0?'Intra-group dispersion elevated: '+worstA.short+' at z '+results[worst][tf].toFixed(2)+' — relative value opportunity.':'Group conviction is high — overweight the category.'}`
          :annLang?`${grp.name} annual composite z: ${avg.toFixed(2)}. Build a core position in ${bestA.short} (z ${results[best][tf].toFixed(2)}). ${spread>1.0?worstA.short+' (z '+results[worst][tf].toFixed(2)+') is the annual underweight within the group.':'Broad group strength supports category overweight.'}`
          :`${grp.name} secular composite z: ${avg.toFixed(2)}. ${bestA.short} (z ${results[best][tf].toFixed(2)}) is a multi-year core holding. ${spread>1.0?'Avoid '+worstA.short+' (z '+results[worst][tf].toFixed(2)+') — structural underperformer.':'Size for the cycle.'}`;
      } else {
        detail=tacLang?`${grp.name} z: ${avg.toFixed(2)} — tactical de-risk this week. ${worstA.short} (z ${results[worst][tf].toFixed(2)}) is the cut. ${bestA.short} (z ${results[best][tf].toFixed(2)}) is relative shelter.`
          :ntLang?`${grp.name} composite z: ${avg.toFixed(2)} — de-risk this month. ${worstA.short} at z ${results[worst][tf].toFixed(2)} is the weakest link. ${bestA.short} (z ${results[best][tf].toFixed(2)}) provides near-term shelter.`
          :annLang?`${grp.name} annual z: ${avg.toFixed(2)} — underweight for the year. ${worstA.short} (z ${results[worst][tf].toFixed(2)}) leads the decline. Reduce exposure systematically.`
          :`${grp.name} secular z: ${avg.toFixed(2)} — structural headwind. Sell ${worstA.short} (z ${results[worst][tf].toFixed(2)}). Only ${bestA.short} offers relative value.`;
      }
    } else {
      title=`${grp.name}: Dispersion Play — ${bestA.short} vs ${worstA.short}`;
      detail=tacLang?`No clear ${grp.name} direction this week (avg z: ${avg.toFixed(2)}). The trade is relative: ${bestA.short} (z ${results[best][tf].toFixed(2)}) over ${worstA.short} (z ${results[worst][tf].toFixed(2)}).`
        :ntLang?`No directional call in ${grp.name} this month (avg z: ${avg.toFixed(2)}). Dispersion is the story: ${bestA.short} at z ${results[best][tf].toFixed(2)} vs ${worstA.short} at z ${results[worst][tf].toFixed(2)}.`
        :annLang?`Annual ${grp.name} outlook is neutral (avg z: ${avg.toFixed(2)}). Within-group positioning matters: overweight ${bestA.short}, underweight ${worstA.short}.`
        :`Secular ${grp.name} view is mixed (avg z: ${avg.toFixed(2)}). Focus on relative value: ${bestA.short} (z ${results[best][tf].toFixed(2)}) vs ${worstA.short} (z ${results[worst][tf].toFixed(2)}).`;
    }
    acInsights.push({title,detail,color:Math.abs(avg)>0.5?(avg>0?'var(--up)':'var(--dn)'):'var(--wn)',
      tags:[{l:bestA.short+' '+results[best][tf].toFixed(2),c:results[best][tf]>0?'rgba(58,159,216,0.15)':'rgba(196,77,94,0.12)',tc:results[best][tf]>0?'var(--up)':'var(--dn)'},
            {l:grp.name+' avg '+avg.toFixed(2),c:grp.bg,tc:grp.color}],
      urgency:interest,assetIds:new Set(gIds)});
  });
  // Sort asset class insights by how interesting they are and add top 2
  acInsights.sort((a,b)=>b.urgency-a.urgency);
  acInsights.slice(0,2).forEach(i=>candidates.push(i));

  // ── 3. Cross-asset rotation (equity vs bond spread) — only if dramatic ──
  const eqIds=['sp500','iwm','eem','efa','vug','vtv','vym','vymi'].filter(id=>results[id]);
  const bondIds=['agg','tlt','vgsh','bndx','lqd'].filter(id=>results[id]);
  if(eqIds.length>1&&bondIds.length){
    const eqS=eqIds.reduce((s,id)=>s+results[id][tf],0)/eqIds.length;
    const bdS=bondIds.reduce((s,id)=>s+results[id][tf],0)/bondIds.length;
    const spread=eqS-bdS;
    if(Math.abs(spread)>0.6){
      const title2=spread>0?`${frame}: Equities Over Fixed Income`:`${frame}: Duration Over Equity Risk`;
      const detail2=spread>0?(tacLang?`This week: equity composite (z ${eqS.toFixed(2)}) leads FI (z ${bdS.toFixed(2)}) by ${spread.toFixed(2)}σ. Tilt toward equities tactically.`
        :ntLang?`Near-term: equity composite (z ${eqS.toFixed(2)}) leads FI (z ${bdS.toFixed(2)}) by ${spread.toFixed(2)}σ. Overweight equities, use short-duration bonds as ballast.`
        :annLang?`Annual: equity composite (z ${eqS.toFixed(2)}) outpacing FI (z ${bdS.toFixed(2)}) by ${spread.toFixed(2)}σ. Build equity overweight for the year.`
        :`Secular: equities (z ${eqS.toFixed(2)}) structurally preferred over bonds (z ${bdS.toFixed(2)}). Overweight equities within policy bands for the cycle.`)
        :(tacLang?`This week: FI (z ${bdS.toFixed(2)}) outscoring equities (z ${eqS.toFixed(2)}). Reduce equity beta tactically. Add duration through `+(results.tlt?'TLT or ':'')+`AGG.`
        :ntLang?`Near-term: FI (z ${bdS.toFixed(2)}) materially outscoring equities (z ${eqS.toFixed(2)}). Cut equity exposure, add duration selectively.`
        :annLang?`Annual: FI (z ${bdS.toFixed(2)}) preferred over equities (z ${eqS.toFixed(2)}). Extend duration as a core allocation shift for the year.`
        :`Secular: FI (z ${bdS.toFixed(2)}) structurally outpacing equities (z ${eqS.toFixed(2)}). This is a strategic allocation shift — extend duration permanently.`);
      candidates.push({title:title2,detail:detail2,color:spread>0?'var(--up)':'var(--dn)',
        tags:[{l:'EQ '+eqS.toFixed(2),c:'rgba(0,156,220,0.12)',tc:'var(--ac)'},{l:'FI '+bdS.toFixed(2),c:'rgba(110,137,168,0.12)',tc:'var(--wn)'}],
        urgency:2+Math.abs(spread)*2,assetIds:new Set([...eqIds,...bondIds])});
    }
  }

  // ── 4. Biggest horizon divergence (skip assets already in regime call) ──
  if(!isTactical){
    const regimeIds=candidates[0]?.assetIds||new Set();
    const divs=available.filter(a=>!regimeIds.has(a.id)).map(a=>{const r=results[a.id];return{a,gap:r[tf]-r.wk,tfS:r[tf],wkS:r.wk};}).sort((a,b)=>Math.abs(b.gap)-Math.abs(a.gap));
    const topDiv=divs[0];
    if(topDiv&&Math.abs(topDiv.gap)>0.6){
      const longer=topDiv.tfS>topDiv.wkS;
      candidates.push({
        title:`${topDiv.a.short}: ${longer?frame+' Tailwind, Weekly Pullback':'Weekly Strength, '+frame+' Headwind'}`,
        detail:`${topDiv.a.short} shows ${Math.abs(topDiv.gap).toFixed(2)}σ divergence between ${frame.toLowerCase()} (z ${topDiv.tfS.toFixed(2)}) and weekly (z ${topDiv.wkS.toFixed(2)}). ${longer?(annLang||secLang?'The multi-year signal is constructive — accumulate on this near-term dip.':'The '+frame.toLowerCase()+' signal remains positive — use this week\'s weakness to add.'):(annLang||secLang?'Weekly momentum is strong but the structural view is deteriorating. Take profits on rallies.':'Near-term momentum is outpacing the '+frame.toLowerCase()+' trend. Tighten stops and trail higher.')}`,
        color:longer?'var(--up)':'var(--dn)',
        tags:[{l:topDiv.a.short+' '+fp2(results[topDiv.a.id].r1w)+' 1W',c:results[topDiv.a.id].r1w>=0?'rgba(58,159,216,0.15)':'rgba(196,77,94,0.12)',tc:results[topDiv.a.id].r1w>=0?'var(--up)':'var(--dn)'}],
        urgency:Math.abs(topDiv.gap)*2.5,assetIds:new Set([topDiv.a.id])});
    }
  }

  // ── 5. Tactical: biggest weekly momentum shift (different asset from regime) ──
  if(isTactical){
    const regimeIds=candidates[0]?.assetIds||new Set();
    const shifts2=available.filter(a=>!regimeIds.has(a.id)).map(a=>{const r=results[a.id];return{a,shift:r.wk-r.mo,wk:r.wk};}).sort((a,b)=>Math.abs(b.shift)-Math.abs(a.shift));
    const top=shifts2[0];
    if(top&&Math.abs(top.shift)>0.5){
      candidates.push({title:`Momentum Alert: ${top.a.short} ${top.shift>0?'Inflecting Higher':'Rolling Over'}`,
        detail:`${top.a.short} weekly z-score diverging ${Math.abs(top.shift).toFixed(2)}σ from monthly baseline. ${top.shift>0?'Fastest improving name in our universe — initiate tactical position or add to existing.':'Sharpest deterioration across all assets. Reduce exposure before the trend confirms further.'}`,
        color:top.shift>0?'var(--up)':'var(--dn)',
        tags:[{l:top.a.short+' '+fp2(results[top.a.id].r1w),c:top.shift>0?'rgba(58,159,216,0.15)':'rgba(196,77,94,0.12)',tc:top.shift>0?'var(--up)':'var(--dn)'}],
        urgency:Math.abs(top.shift)*2.5,assetIds:new Set([top.a.id])});
    }
  }

  // ── 6. Strategic: US vs International ──
  if(isStrategic){
    const usIds=['sp500','iwm','vug','vtv','vym'].filter(id=>results[id]);
    const intlIds=['eem','efa','vymi','acwx'].filter(id=>results[id]);
    if(usIds.length&&intlIds.length){
      const usS=usIds.reduce((s,id)=>s+results[id][tf],0)/usIds.length;
      const intlS=intlIds.reduce((s,id)=>s+results[id][tf],0)/intlIds.length;
      const gap=usS-intlS;
      if(Math.abs(gap)>0.4){
        candidates.push({title:`${frame} Geography: ${gap>0?'Maintain US Overweight':'Allocate Toward International'}`,
          detail:`US composite z ${usS.toFixed(2)} vs International z ${intlS.toFixed(2)} — ${Math.abs(gap).toFixed(2)}σ gap. ${gap>0?(annLang?'US is the annual overweight within global equity.':'US remains the structural overweight for the cycle. Size accordingly.'):(annLang?'International closing the gap this year. Diversify toward EEM and EFA.':'Secular shift toward international developing. Allocate toward EM (EEM) and developed markets (EFA/VYMI) over multiple years.')}`,
          color:gap>0?'var(--ac)':'#3a9fd8',
          tags:[{l:'US '+usS.toFixed(2),c:'rgba(0,156,220,0.12)',tc:'var(--ac)'},{l:'Intl '+intlS.toFixed(2),c:'rgba(58,159,216,0.12)',tc:'#3a9fd8'}],
          urgency:1.5+Math.abs(gap)*2,assetIds:new Set([...usIds,...intlIds])});
      }
    }
  }

  // ── 7. Extreme z-score readings ──
  const extremes=available.filter(a=>Math.abs(results[a.id][tf])>2.0);
  if(extremes.length){
    const bulls=extremes.filter(a=>results[a.id][tf]>2.0).map(a=>a.short);
    const bears=extremes.filter(a=>results[a.id][tf]<-2.0).map(a=>a.short);
    let d3='';
    if(bulls.length)d3+=`<span style="color:var(--up)">${bulls.join(', ')}</span> registering extreme positive z-scores. `;
    if(bears.length)d3+=`<span style="color:var(--dn)">${bears.join(', ')}</span> at extreme negative readings. `;
    d3+=tacLang?'Tactical extremes can snap back — scale in and use stops.':ntLang?'Near-term extremes may persist for weeks. Scale into positions rather than going all-in.':annLang?'Annual extremes carry moderate signal reliability. Position with measured conviction.':'Multi-year extremes carry the highest signal reliability — size positions with conviction for the cycle.';
    candidates.push({title:`Outlier Watch: ${[...bulls,...bears].join(', ')} at ${frame} Extremes`,detail:d3,color:'#5889b0',
      tags:extremes.slice(0,3).map(a=>({l:a.short+' '+results[a.id][tf].toFixed(2),c:results[a.id][tf]>0?'rgba(58,159,216,0.15)':'rgba(196,77,94,0.12)',tc:results[a.id][tf]>0?'var(--up)':'var(--dn)'})),
      urgency:extremes.length*1.2,assetIds:new Set(extremes.map(a=>a.id))});
  }

  // ── SELECT TOP 3 with de-duplication ──
  // Regime call is always first. Then pick 2 more that don't heavily overlap with assets already shown.
  const selected=[candidates[0]]; // regime call
  const usedIds=new Set(candidates[0]?.assetIds||[]);
  const remaining=candidates.slice(1).sort((a,b)=>b.urgency-a.urgency);
  for(const c of remaining){
    if(selected.length>=3)break;
    // Check overlap: if >50% of this insight's assets are already shown, penalize
    const overlap=c.assetIds?[...c.assetIds].filter(id=>usedIds.has(id)).length:0;
    const total=c.assetIds?c.assetIds.size:1;
    if(overlap/total>0.5&&selected.length>=2)continue; // skip high-overlap for 3rd slot
    selected.push(c);
    if(c.assetIds)c.assetIds.forEach(id=>usedIds.add(id));
  }
  // Fill remaining slots if needed
  while(selected.length<3&&remaining.length>selected.length-1){
    const next=remaining.find(c=>!selected.includes(c));
    if(next)selected.push(next);else break;
  }
  return selected;
}

function drawSparklines(results,range){
  range=range||window._sparkRange||'3y';
  const now=new Date();
  ASSETS.forEach(a=>{
    const r=results[a.id];if(!r||!r.closesAll||!r.datesAll)return;
    const cvs=document.getElementById('spark-'+a.id);if(!cvs)return;
    const ctx=cvs.getContext('2d');
    let data,dates=r.datesAll,closes=r.closesAll;
    if(range==='ytd'){
      const jan1=new Date(now.getFullYear(),0,1).getTime()/1000;
      const startIdx=dates.findIndex(d=>d>=jan1);
      data=startIdx>=0?closes.slice(startIdx):closes.slice(-60);
    } else if(range==='1y'){
      data=closes.slice(-252);
    } else {
      data=closes.slice(-750);// ~3 years
    }
    if(data.length<5)return;
    const w=cvs.width,h=cvs.height;
    const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
    ctx.clearRect(0,0,w,h);
    // gradient fill
    const grad=ctx.createLinearGradient(0,0,0,h);
    const isUp=data[data.length-1]>=data[0];
    grad.addColorStop(0,isUp?'rgba(58,159,216,0.12)':'rgba(196,77,94,0.12)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.moveTo(0,h);
    for(let i=0;i<data.length;i++){const x=i/(data.length-1)*w,y=h-(data[i]-mn)/rng*h;if(i===0)ctx.lineTo(x,y);else ctx.lineTo(x,y);}
    ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    // line
    ctx.beginPath();
    for(let i=0;i<data.length;i++){const x=i/(data.length-1)*w,y=h-(data[i]-mn)/rng*h;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.strokeStyle=isUp?'rgba(58,159,216,0.6)':'rgba(196,77,94,0.6)';ctx.lineWidth=1.5;ctx.stroke();
    // current price dot
    const lastY=h-(data[data.length-1]-mn)/rng*h;
    ctx.beginPath();ctx.arc(w-1,lastY,2.5,0,Math.PI*2);ctx.fillStyle=isUp?'#3a9fd8':'#c44d5e';ctx.fill();
    // return % label
    const retPct=((data[data.length-1]-data[0])/data[0]*100);
    ctx.font='bold 9px JetBrains Mono';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillStyle=isUp?'rgba(58,159,216,0.7)':'rgba(196,77,94,0.7)';
    ctx.fillText((retPct>=0?'+':'')+retPct.toFixed(1)+'%',3,3);
    // range label
    ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillText(range.toUpperCase(),w-3,3);
  });
}

        ${res.vgsh?'<tr><td style="padding:4px 8px;color:var(--txb);">VGSH</td><td style="text-align:center;padding:4px 6px;" class="'+vL(res.vgsh.wk).c+'">'+res.vgsh.wk.toFixed(2)+'</td><td style="text-align:center;padding:4px 6px;" class="'+vL(res.vgsh.mo).c+'">'+res.vgsh.mo.toFixed(2)+'</td><td style="text-align:center;padding:4px 6px;color:'+((res.vgsh.wk-res.vgsh.mo)>0?'var(--up)':'var(--dn)')+'">'+((res.vgsh.wk-res.vgsh.mo)>0?'+':'')+(res.vgsh.wk-res.vgsh.mo).toFixed(2)+'σ</td><td style="text-align:center;padding:4px 6px;" class="'+(res.vgsh.r1w>=0?'c-up':'c-dn')+'">'+fp2(res.vgsh.r1w)+'</td><td style="text-align:center;padding:4px 6px;" class="'+vL(res.vgsh.mo).c+'">'+vL(res.vgsh.mo).l+'</td></tr>':''}

    }
    // Long-term structural view
    const yrSpread=eqYrAvg-bdYrAvg;

  } else html+='<p style="font-size:0.88em;color:var(--txd);">Insufficient stock/bond data for rotation analysis.</p>';
  html+='</div>';

  // ═══ 2. US vs NON-US EQUITIES ═══
  const usEqIds=['sp500','iwm','vug','vtv','vym'].filter(id=>res[id]);

    if(parts.length)html+=`<p style="font-size:0.82em;color:var(--txd);line-height:1.7;">${parts.join(' | ')}</p>`;

  // ═══ 3. GROWTH vs VALUE ═══

    html+=`<p style="font-size:0.88em;color:var(--tx);line-height:1.8;margin-bottom:8px;">${detail}</p>`;
    html+=`<p style="font-size:0.82em;color:var(--txd);line-height:1.7;">VUG: $${gR.px.toFixed(2)} (${fp2(gR.r1w)} 1W, RSI ${gR.cRSI?.toFixed(0)}) | VTV: $${vR.px.toFixed(2)} (${fp2(vR.r1w)} 1W, RSI ${vR.cRSI?.toFixed(0)}) | 1W spread: ${fp2(gv1w)}</p>`;
    // Dividend angle
    if(res.vym){const dy=res.vym;html+=`<p style="font-size:0.82em;color:var(--txd);line-height:1.7;margin-top:4px;">High dividend (VYM): <span class="${vL(dy.mo).c}">${vl(dy.mo)}</span> (z ${dy.mo.toFixed(2)}) — ${dy.mo>vR.mo?'outpacing broad value, income trade working':'lagging value, capital appreciation preferred over yield'}.</p>`;}
    if(res.vymi){const dyi=res.vymi;html+=`<p style="font-size:0.82em;color:var(--txd);line-height:1.7;">Intl dividend (VYMI): <span class="${vL(dyi.mo).c}">${vl(dyi.mo)}</span> (z ${dyi.mo.toFixed(2)}) — ${dyi.mo>0.5?'international income strategy showing strength':'international yield not compelling relative to US'}.</p>`;}
  } else html+='<p style="font-size:0.88em;color:var(--txd);">Add VUG and VTV for growth vs value analysis.</p>';
  html+='</div>';

  // ═══ 4. COMMODITIES & REAL ASSETS ═══
  const commIds=['gld','slv','weat','uso','copx','sil'].filter(id=>res[id]);
  if(commIds.length>=2){
    html+='<div style="margin-bottom:20px;padding:16px;background:var(--s2);border-radius:8px;border-left:3px solid #7a9ab8;">';
    html+='<div style="font-weight:700;font-size:0.95em;color:var(--txb);margin-bottom:8px;">Commodities & Real Assets</div>';
    const commMo=commIds.reduce((s,id)=>s+res[id].mo,0)/commIds.length;
    const metals=['gld','slv','sil'].filter(id=>res[id]),energy=['uso'].filter(id=>res[id]),agri=['weat'].filter(id=>res[id]),industrial=['copx'].filter(id=>res[id]);
    let parts2=[];
    if(metals.length){const mAvg=metals.reduce((s,id)=>s+res[id].mo,0)/metals.length;parts2.push(`Metals: <span class="${vL(mAvg).c}">z ${mAvg.toFixed(2)}</span>`);}
    if(energy.length&&res.uso)parts2.push(`Oil: <span class="${vL(res.uso.mo).c}">z ${res.uso.mo.toFixed(2)}</span>`);
    if(agri.length&&res.weat)parts2.push(`Wheat: <span class="${vL(res.weat.mo).c}">z ${res.weat.mo.toFixed(2)}</span>`);
    if(industrial.length&&res.copx)parts2.push(`Copper: <span class="${vL(res.copx.mo).c}">z ${res.copx.mo.toFixed(2)}</span>`);
    html+=`<p style="font-size:0.88em;color:var(--tx);line-height:1.8;margin-bottom:6px;">Commodity composite: <span class="${vL(commMo).c}">${vl(commMo)}</span> (z ${commMo.toFixed(2)}). ${commMo>0.5?'Real assets catching a bid — inflation hedge or supply constraints.':commMo<-0.5?'Commodities under pressure — deflationary signal or demand weakness.':'Commodities range-bound.'} ${res.dxy?'Dollar impact: '+(res.dxy.mo>0.5?'strong USD pressuring commodities.':res.dxy.mo<-0.5?'weak USD providing tailwind.':'neutral.'):''}</p>`;
    html+=`<p style="font-size:0.82em;color:var(--txd);line-height:1.7;">${parts2.join(' | ')}</p>`;
    html+='</div>';
  }

  // ═══ 5. PORTFOLIO POSITIONING SUMMARY ═══
  html+='<div style="margin-bottom:20px;padding:16px;background:var(--s2);border-radius:8px;border-left:3px solid #005F9E;">';
  html+='<div style="font-weight:700;font-size:0.95em;color:var(--txb);margin-bottom:8px;">Positioning Summary</div>';
  // Analyze the monthly portfolio allocation
  if(moP.allocs.length){
    const topHoldings=moP.allocs.slice(0,3).map(a=>`${a.name} (${(a.w*100).toFixed(1)}%)`).join(', ');
    const botHoldings=moP.allocs.slice(-2).map(a=>`${a.name} (${(a.w*100).toFixed(1)}%)`).join(', ');
    // Category concentration
    const cats={};moP.allocs.forEach(a=>{const asset=ASSETS.find(x=>x.short===a.name);const cat=asset?asset.cat:a.cat;cats[cat]=(cats[cat]||0)+a.w;});
    const topCat=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
    const equityWt=['US Large Cap','US Small Cap','Intl Equity','Intl Developed','US Growth','US Value','US Dividend','Intl Dividend'].reduce((s,c)=>s+(cats[c]||0),0);
    const bondWt=['Fixed Income'].reduce((s,c)=>s+(cats[c]||0),0);
    const creditWt=['Credit','EM Debt'].reduce((s,c)=>s+(cats[c]||0),0);
    const commWt=['Commodity'].reduce((s,c)=>s+(cats[c]||0),0);
    const cryptoWt=['Crypto'].reduce((s,c)=>s+(cats[c]||0),0);
    html+=`<p style="font-size:0.88em;color:var(--tx);line-height:1.8;margin-bottom:6px;"><b>Monthly portfolio:</b> ${(equityWt*100).toFixed(0)}% equity / ${(bondWt*100).toFixed(0)}% bonds / ${(creditWt*100).toFixed(0)}% credit / ${(commWt*100).toFixed(0)}% commodities / ${(cryptoWt*100).toFixed(0)}% crypto. Top: ${topHoldings}. Smallest: ${botHoldings}.</p>`;
    // Risk concentration warning
    if(topCat[0]&&topCat[0][1]>0.5)html+=`<p style="font-size:0.82em;color:var(--wn);line-height:1.7;">Concentration: ${(topCat[0][1]*100).toFixed(0)}% in ${topCat[0][0]} — consider diversifying if this exceeds your risk tolerance.</p>`;
    // Conviction spread
    const convSpread=moP.allocs[0].w-moP.allocs[moP.allocs.length-1].w;
    html+=`<p style="font-size:0.82em;color:var(--txd);line-height:1.7;">Conviction spread: ${(convSpread*100).toFixed(1)}pp between top and bottom holding. ${convSpread>0.15?'High conviction — optimizer sees clear winners.':convSpread>0.08?'Moderate conviction — some differentiation.':'Low conviction — signals are clustered, consider equal-weighting.'}</p>`;
  }
  html+='</div>';
  html+='</div>';
  return html;
}

function renderPortHorizon(p,label,key,wl,horizon){const v=vL(p.exp);let bars=p.allocs.map(a=>`<div class="bar-row"><span class="bar-name">${a.name}</span><div class="bar-wrap"><div class="bar-fill" style="width:${(a.w*100).toFixed(0)}%;background:${a.color};"><span class="bar-pct-inner">${(a.w*100).toFixed(1)}%</span></div></div><span class="bar-pct" style="color:${a.color}">${(a.w*100).toFixed(1)}%</span><span class="bar-score ${sc2(a.score)}">${a.score.toFixed(2)}</span></div>`).join('');
  // Asset-class breakdown
  const acWts={};p.allocs.forEach(a=>{const asset=ASSETS.find(x=>x.short===a.name);const ac=asset?assetClass(asset):a.cat;acWts[ac]=(acWts[ac]||0)+a.w;});
  const acBar=Object.entries(acWts).sort((a,b)=>b[1]-a[1]).map(([ac,w])=>`<span style="font-family:var(--mn);font-size:0.72em;color:var(--txd);margin-right:10px;">${ac}: <b style="color:var(--txb)">${(w*100).toFixed(0)}%</b></span>`).join('');
  const volNote=p.portVol?`<span style="font-family:var(--mn);font-size:0.72em;color:var(--txd);margin-left:12px;">Est. vol: <b style="color:var(--txb)">${(p.portVol*100).toFixed(1)}%</b></span>`:'';
  return`<div class="port-horizon"><div class="port-horizon-hdr"><div class="ph-left"><h3>${label}</h3><div class="ph-sub">${wl}</div></div><div class="ph-verdict"><div class="ph-verdict-val ${v.c}">${v.l}</div><div class="ph-verdict-sc">Z: ${p.exp.toFixed(2)}</div></div></div><div style="padding:6px 18px 10px;border-bottom:1px solid var(--s3);">${acBar}${volNote}</div><div class="port-viz"><div class="port-donut"><canvas id="dn-${key}"></canvas></div><div class="port-bars">${bars}</div></div><div class="port-narr">${genNarrative(p,horizon)}</div></div>`;}

// Sort + timeframe controls
window._sortTF = 'mo';
window._sortBy = 'bullish';

function setTF(tf) {
  window._sortTF = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tf-btn[data-tf="${tf}"]`)?.classList.add('active');
  // Update heatmap card highlights
  const tfIdx={wk:0,mo:1,yr:2,y3:3,y5:4,y10:5}[tf]||1;
  document.querySelectorAll('.hm-card').forEach(card => {
    const id = card.dataset.id, r = window._res[id]; if(!r)return;
    // Highlight the active timeframe cell
    const cells=card.querySelectorAll('.hm-cell');
    cells.forEach((c,i)=>{c.style.outline=i===tfIdx?'2px solid var(--ac)':'none';c.style.outlineOffset=i===tfIdx?'-1px':'0';});
  });
  // Also update leaders & laggards, buys/sells, implications
  updateLL(tf);
  updateBuysSells(tf);
  // Sync impl horizon toggle
  window._implTF=tf;
  document.querySelectorAll('.impl-hz-btn[data-ihz]').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.impl-hz-btn[data-ihz="${tf}"]`)?.classList.add('active');
  updateImplications(tf);
  sortOverview(window._sortBy);
}

function sortOverview(sortBy) {
  window._sortBy = sortBy;
  const container = document.getElementById('hm-container'); if(!container)return;
  const tf = window._sortTF;
  const assetMap=Object.fromEntries(ASSETS.map(a=>[a.id,a]));
  const cards = Array.from(container.children);
  cards.sort((a,b) => {
    const aId=a.dataset.id,bId=b.dataset.id,aR=window._res[aId],bR=window._res[bId];
    if(!aR)return 1;if(!bR)return -1;
    const aS=aR[tf]!=null?aR[tf]:aR.mo;
    const bS=bR[tf]!=null?bR[tf]:bR.mo;
    if(sortBy==='conviction')return Math.abs(bS)-Math.abs(aS);
    if(sortBy==='bullish')return bS-aS;
    if(sortBy==='bearish')return aS-bS;
    if(sortBy==='1w')return(bR.r1w||0)-(aR.r1w||0);
    if(sortBy==='worst1w')return(aR.r1w||0)-(bR.r1w||0);
    if(sortBy==='name'){const aN=assetMap[aId]?.name||'',bN=assetMap[bId]?.name||'';return aN.localeCompare(bN);}
    if(sortBy==='cat'){const aC=assetMap[aId]?.cat||'',bC=assetMap[bId]?.cat||'';return aC.localeCompare(bC)||(bS-aS);}
    if(sortBy==='rsi')return(bR.cRSI||50)-(aR.cRSI||50);
    return 0;
  });
  cards.forEach((card,i)=>{card.style.order=i;});
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.sort-btn[data-sort="${sortBy}"]`)?.classList.add('active');
  // Re-apply AC filter after sort
  if(window._acFilter&&window._acFilter!=='all')filterAC(window._acFilter);
}
function filterAC(ac){
  window._acFilter=ac;
  document.querySelectorAll('.ac-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.ac-btn[data-ac="${ac}"]`)?.classList.add('active');
  const assetMap=Object.fromEntries(ASSETS.map(a=>[a.id,a]));
  document.querySelectorAll('.hm-card').forEach(card=>{
    const id=card.dataset.id;const a=assetMap[id];
    if(!a){card.style.display='none';return;}
    if(ac==='all'){card.style.display='';}
    else{card.style.display=assetClass(a)===ac?'':'none';}
  });
}

// === CORRELATION HEATMAP (all 4 matrices, headlines, sortable table, observations) ===
function calcCorrN(a,b,days){const n=Math.min(a.length,b.length,days);if(n<5)return null;const aa=a.slice(-n),bb=b.slice(-n);const ma=aa.reduce((s,v)=>s+v,0)/n,mb=bb.reduce((s,v)=>s+v,0)/n;let num=0,da=0,db=0;for(let i=0;i<n;i++){const x=aa[i]-ma,y=bb[i]-mb;num+=x*y;da+=x*x;db+=y*y;}const den=Math.sqrt(da*db);return den===0?0:num/den;}
function buildCorrMatrices(results){
  const ids=ASSETS.filter(a=>results[a.id]&&results[a.id].closesAll&&results[a.id].closesAll.length>=15);

function genCorrHeadlines(pairs){
  const hl=[];
  // 1. Most correlated pair (concentration risk)
  const byC30=[...pairs].filter(p=>p.c30!=null).sort((a,b)=>b.c30-a.c30);
  if(byC30.length&&byC30[0].c30>0.3){const p=byC30[0];
    hl.push({theme:p.theme,themeBg:'rgba(196,77,94,0.12)',themeColor:'var(--dn)',
      title:`${p.a.short} & ${p.b.short} are the most correlated pair at ${p.c30.toFixed(2)} (30d)`,
      detail:`${p.c30>0.7?'Near-lockstep movement means holding both adds minimal diversification.':'Strong co-movement suggests shared risk drivers.'} 1Y correlation: ${p.c252!=null?p.c252.toFixed(2):'N/A'}.`});}
  // 2. Best diversifier (lowest/most negative)
  if(byC30.length){const p=byC30[byC30.length-1];
    hl.push({theme:p.theme,themeBg:'rgba(58,159,216,0.12)',themeColor:'var(--up)',
      title:`${p.a.short} & ${p.b.short} offer the best diversification at ${p.c30.toFixed(2)} (30d)`,
      detail:`${p.c30<-0.1?'Inverse relationship makes this an effective hedging pair.':'Low correlation means these assets respond to different drivers.'}`});}
  // 3. Biggest rising correlation (regime convergence)
  const byDelta=[...pairs].filter(p=>p.c30!=null&&p.c90!=null).sort((a,b)=>(b.c30-b.c90)-(a.c30-a.c90));
  if(byDelta.length&&(byDelta[0].c30-byDelta[0].c90)>0.08){const p=byDelta[0],d=p.c30-p.c90;
    hl.push({theme:p.theme,themeBg:'rgba(110,137,168,0.12)',themeColor:'var(--wn)',
      title:`${p.a.short}–${p.b.short} correlation is surging: ${p.c90.toFixed(2)} → ${p.c30.toFixed(2)} (+${(d*100).toFixed(0)}pp)`,
      detail:`Rapid convergence over 90→30 days signals these assets are increasingly driven by the same macro factors. Diversification benefit is eroding.`});}
  // 4. Biggest falling correlation (regime divergence)
  if(byDelta.length){const p=byDelta[byDelta.length-1],d=p.c30-p.c90;
    if(d<-0.08)hl.push({theme:p.theme,themeBg:'rgba(0,156,220,0.12)',themeColor:'var(--ac)',
      title:`${p.a.short}–${p.b.short} decoupling: ${p.c90.toFixed(2)} → ${p.c30.toFixed(2)} (${(d*100).toFixed(0)}pp)`,
      detail:`These assets are diverging from their recent relationship, which may signal a structural regime change or emerging idiosyncratic drivers.`});}
  // 5. Short vs long-term structural mismatch
  const byLT=[...pairs].filter(p=>p.c30!=null&&p.c252!=null).sort((a,b)=>Math.abs(b.c30-b.c252)-Math.abs(a.c30-a.c252));
  if(byLT.length&&Math.abs(byLT[0].c30-byLT[0].c252)>0.15){const p=byLT[0],d=p.c30-p.c252;
    hl.push({theme:p.theme,themeBg:'rgba(0,95,158,0.12)',themeColor:'var(--ac2)',
      title:`${p.a.short}–${p.b.short}: 30d (${p.c30.toFixed(2)}) vs 1Y (${p.c252.toFixed(2)}) — ${Math.abs(d)>0.3?'major':'notable'} divergence`,
      detail:`${d>0?'Short-term correlation is well above the long-run norm, suggesting a temporary macro-driven convergence that may revert.':'Short-term correlation has dropped below the historical baseline — unique asset-specific factors are dominating.'}`});}
  // Fill to 5 if needed
  while(hl.length<5&&byC30.length>hl.length){const p=byC30[Math.min(hl.length,byC30.length-1)];
    const avgAll=pairs.reduce((s,x)=>s+(x.c30||0),0)/pairs.length;
    hl.push({theme:'Market-Wide',themeBg:'rgba(255,255,255,0.05)',themeColor:'var(--txd)',
      title:`Average cross-asset 30d correlation: ${avgAll.toFixed(3)}`,
      detail:`${avgAll>0.4?'Elevated correlation regime — macro themes dominate over stock-specific drivers.':avgAll>0.2?'Moderate correlation — balanced mix of macro and idiosyncratic drivers.':'Low correlation environment favors diversified, multi-asset portfolios.'}`});break;}
  return hl.slice(0,5);
}

function buildCorrObservations(){

  let html='<div class="c-title">Detailed Observations</div>';
  // Group by theme
  const themes={};pairs.forEach(p=>{if(!themes[p.theme])themes[p.theme]=[];themes[p.theme].push(p);});
  for(const[theme,tPairs] of Object.entries(themes)){
    const avg30=tPairs.reduce((s,p)=>s+(p.c30||0),0)/tPairs.length;
    const avg252=tPairs.filter(p=>p.c252!=null);const avgLT=avg252.length?avg252.reduce((s,p)=>s+p.c252,0)/avg252.length:null;
    html+=`<h3 style="font-family:var(--mn);font-size:0.88em;color:var(--ac);margin:16px 0 8px;">${theme} <span style="color:var(--txd);font-weight:400;font-size:0.85em;">(${tPairs.length} pair${tPairs.length>1?'s':''})</span></h3>`;
    html+=`<p style="font-size:0.85em;color:var(--tx);line-height:1.7;margin-bottom:8px;">Avg 30d correlation: <b>${avg30.toFixed(3)}</b>${avgLT!=null?` | 1Y: <b>${avgLT.toFixed(3)}</b>`:''}.  `;
    if(avgLT!=null&&avg30>avgLT+0.1)html+=`<span class="c-wn">Short-term correlation elevated vs history — convergence underway.</span>`;
    else if(avgLT!=null&&avg30<avgLT-0.1)html+=`<span class="c-up">Short-term correlation below historical norm — diversification improving.</span>`;
    else html+=`In line with historical averages.`;
    html+=`</p>`;
    // Notable pairs in this theme
    const notable=tPairs.filter(p=>p.c30!=null&&(Math.abs(p.c30)>0.5||(p.c252!=null&&Math.abs(p.c30-p.c252)>0.2)));
    notable.slice(0,2).forEach(p=>{

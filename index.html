    });
  }
  // Market-wide summary
  const avgAll30=pairs.reduce((s,p)=>s+(p.c30||0),0)/pairs.length;
  const allLT=pairs.filter(p=>p.c252!=null);const avgAllLT=allLT.length?allLT.reduce((s,p)=>s+p.c252,0)/allLT.length:null;
  html+=`<h3 style="font-family:var(--mn);font-size:0.88em;color:var(--txb);margin:18px 0 8px;">Market-Wide Summary</h3>`;
  html+=`<p style="font-size:0.88em;color:var(--tx);line-height:1.7;">Average 30d cross-asset correlation: <b>${avgAll30.toFixed(3)}</b>${avgAllLT!=null?` vs 1Y: <b>${avgAllLT.toFixed(3)}</b>`:''}.  ${avgAll30>0.4?'<span class="c-wn">Elevated — risk-on/risk-off dynamics dominate. Limited diversification.</span>':avgAll30>0.2?'Moderate — reasonable diversification across assets.':'<span class="c-up">Low — strong diversification potential.</span>'}</p>`;
  el.innerHTML=html;
}

// === STOCK-BOND CORRELATION MONITOR ===
function buildStockBondMonitor(){
  const el=document.getElementById('corrStockBond');if(!el||!window._corrData||!window._auxData)return;
  const res=window._res;if(!res?.sp500)return;
  // Prefer actual bond ETF data (AGG or TLT) if available, fall back to 10Y yield proxy
  const spxCl=res.sp500.closesAll;
  const hasAGG=res.agg&&res.agg.closesAll&&res.agg.closesAll.length>30;
  const hasTLT=res.tlt&&res.tlt.closesAll&&res.tlt.closesAll.length>30;
  const useETF=hasAGG||hasTLT;
  const bondCl=hasAGG?res.agg.closesAll:hasTLT?res.tlt.closesAll:null;
  const bondLabel=hasAGG?'AGG (US Agg Bond)':hasTLT?'TLT (20+ Yr Treasury)':'10Y Treasury Yield';
  const yldCl=window._auxData.t10y;
  if(!spxCl||((!bondCl||bondCl.length<30)&&(!yldCl||yldCl.length<30))){el.innerHTML='<div class="c-title">Stock–Bond Correlation Monitor</div><p style="color:var(--txd)">Insufficient bond data for analysis.</p>';return;}
  const spxRet=[],bondRet=[];
  if(useETF){
    const minLen=Math.min(spxCl.length,bondCl.length);
    const spxS=spxCl.slice(-minLen),bS=bondCl.slice(-minLen);
    for(let i=1;i<minLen;i++){spxRet.push((spxS[i]-spxS[i-1])/spxS[i-1]);bondRet.push((bS[i]-bS[i-1])/bS[i-1]);}
  } else {
    const minLen=Math.min(spxCl.length,yldCl.length);
    const spxS=spxCl.slice(-minLen),yldS=yldCl.slice(-minLen);
    for(let i=1;i<minLen;i++){spxRet.push((spxS[i]-spxS[i-1])/spxS[i-1]);bondRet.push(yldS[i]-yldS[i-1]);}// yield in levels, not pct
  }
  const sb30=calcCorrN(spxRet,bondRet,30);
  const sb60=calcCorrN(spxRet,bondRet,60);
  const sb90=calcCorrN(spxRet,bondRet,90);
  const sb252=calcCorrN(spxRet,bondRet,252);
  const cv=v=>{if(v==null)return'—';const c=v>0.1?'c-up':v<-0.1?'c-dn':'c-wn';return`<span class="${c}" style="font-weight:700;">${v.toFixed(3)}</span>`;};
  // Interpretation
  let interp='';
  if(sb30!=null){
    if(useETF){
      if(sb30>0.2)interp='<span class="c-dn">High positive stock-bond correlation — stocks and bonds are moving together. Traditional diversification is FAILING. This regime is dangerous for 60/40 portfolios.</span>';
      else if(sb30>-0.1)interp='<span class="c-wn">Near-zero correlation — stocks and bonds are moving independently. Diversification is working, but the hedge is unreliable.</span>';
      else interp='<span class="c-up">Negative correlation — classic regime where bonds rally when stocks fall. 60/40 diversification is effective. Bonds are actively hedging equity risk.</span>';
    } else {
      if(sb30>0.2)interp='<span class="c-dn">Positive stock-yield correlation means stocks and bond yields are rising together — a "growth/inflation" regime. Bonds are NOT hedging equity drawdowns.</span>';
      else if(sb30>-0.1)interp='<span class="c-wn">Near-zero correlation — stocks and bonds are moving independently. Traditional diversification is working, but the hedge is unreliable.</span>';
      else interp='<span class="c-up">Negative correlation — classic "risk-off" regime where bonds rally when stocks fall. Treasuries are actively hedging equity risk.</span>';
    }
  }
  let trend='';
  if(sb30!=null&&sb90!=null){
    const delta=sb30-sb90;
    if(delta>0.15)trend='<span class="c-wn">⚠ Stock-bond correlation is rising — the bond hedge is weakening. Monitor for regime shift.</span>';
    else if(delta<-0.15)trend='<span class="c-up">Stock-bond correlation is falling — bonds are becoming a better hedge. Favorable for balanced portfolios.</span>';
    else trend='Correlation regime is stable vs the 90-day baseline.';
  }
  let ltNote='';
  if(sb30!=null&&sb252!=null){
    const ltDelta=sb30-sb252;
    if(Math.abs(ltDelta)>0.2)ltNote=`<p style="font-size:0.85em;color:var(--wn);line-height:1.7;margin-top:8px;">30d correlation (${sb30.toFixed(2)}) deviates significantly from 1Y (${sb252.toFixed(2)}) by ${ltDelta>0?'+':''}${(ltDelta*100).toFixed(0)}pp — ${ltDelta>0?'short-term inflationary dynamics are dominating':'recent flight-to-quality behavior diverges from the longer trend'}.</p>`;
  }
  let html=`<div class="c-title">Stock–Bond Correlation Monitor <span style="font-size:0.75em;color:var(--txd);font-weight:400;">S&P 500 vs ${bondLabel}${useETF?' (price returns)':' (yield changes)'}</span></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0;">
      <div style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px;text-align:center;">
        <div style="font-family:var(--mn);font-size:0.72em;color:var(--txd);margin-bottom:6px;">30-DAY</div>
        <div style="font-family:var(--mn);font-size:1.6em;font-weight:700;">${cv(sb30)}</div></div>
      <div style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px;text-align:center;">
        <div style="font-family:var(--mn);font-size:0.72em;color:var(--txd);margin-bottom:6px;">60-DAY</div>
        <div style="font-family:var(--mn);font-size:1.6em;font-weight:700;">${cv(sb60)}</div></div>
      <div style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px;text-align:center;">
        <div style="font-family:var(--mn);font-size:0.72em;color:var(--txd);margin-bottom:6px;">90-DAY</div>
        <div style="font-family:var(--mn);font-size:1.6em;font-weight:700;">${cv(sb90)}</div></div>
      <div style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px;text-align:center;">
        <div style="font-family:var(--mn);font-size:0.72em;color:var(--txd);margin-bottom:6px;">1-YEAR</div>
        <div style="font-family:var(--mn);font-size:1.6em;font-weight:700;">${cv(sb252)}</div></div>
    </div>
    <p style="font-size:0.88em;line-height:1.8;margin-bottom:8px;">${interp}</p>
    <p style="font-size:0.85em;color:var(--tx);line-height:1.7;">${trend}</p>${ltNote}
    <p style="font-size:0.78em;color:var(--txd);line-height:1.6;margin-top:12px;padding-top:10px;border-top:1px solid var(--bd);"><b>How to read:</b> Positive = stocks & yields move together (inflationary/growth). Negative = classic flight-to-quality (bonds hedge stocks). Near zero = independent. The 2022+ era has seen persistently positive stock-bond correlation, breaking the pre-2020 negative norm.</p>`;
  el.innerHTML=html;
}

      else if(yv<0.5)risks.push({severity:'ELEVATED',color:'var(--wn)',title:`Yield curve flat (${ycInd.v})`,detail:`Narrow spread suggests limited growth premium. Monitor for further flattening.`});}}
  // 3. Overbought breadth
  const obCount=available.filter(a=>res[a.id].cRSI>70).length;
  if(obCount>=2)risks.push({severity:'ELEVATED',color:'var(--wn)',title:`${obCount} assets overbought (RSI>70)`,detail:`Extended momentum across multiple assets increases the risk of a synchronized pullback. Names: ${available.filter(a=>res[a.id].cRSI>70).map(a=>a.short).join(', ')}.`});
  // 4. Concentration risk
  if(window._corrData?.pairs){const highCorr=window._corrData.pairs.filter(p=>p.c30!=null&&p.c30>0.7);
    if(highCorr.length>=3)risks.push({severity:'ELEVATED',color:'var(--wn)',title:`${highCorr.length} asset pairs with 30d correlation >0.70`,detail:`High intra-portfolio correlation means drawdowns will be synchronized. A single macro shock could hit multiple positions simultaneously.`});}
  // 5. Dollar risk
  if(res.dxy){const d=res.dxy;
    if(Math.abs(d.r1w)>2)risks.push({severity:Math.abs(d.r1w)>3?'HIGH':'ELEVATED',color:d.r1w>0?'var(--wn)':'var(--ac)',
      title:`US Dollar ${d.r1w>0?'surging':'plunging'} (${fp(d.r1w)} 1W)`,detail:`${d.r1w>2?'Dollar strength pressures commodities, EM, and crypto.':'Dollar weakness boosts commodities and international assets.'} Sharp FX moves often trigger cross-asset volatility.`});}
  // 6. Horizon divergences
  const divCount=available.filter(a=>{const r=res[a.id];return Math.sign(r.wk)!==Math.sign(r.yr)&&Math.abs(r.wk-r.yr)>0.3;}).length;
  if(divCount>=2)risks.push({severity:'MONITOR',color:'var(--ac2)',title:`${divCount} assets with major horizon divergence`,detail:`Short-term and long-term signals disagree significantly — these assets are at potential inflection points. Position sizing should be conservative until signals align.`});
  // 7. Stock-bond correlation risk
  if(window._auxData?.t10y&&res.sp500?.closesAll){
    const spxCl=res.sp500.closesAll,yldCl=window._auxData.t10y;
    const minL=Math.min(spxCl.length,yldCl.length);
    if(minL>30){const spxR=[],yldR=[];const sS=spxCl.slice(-minL),yS=yldCl.slice(-minL);
      for(let i=1;i<minL;i++){spxR.push((sS[i]-sS[i-1])/sS[i-1]);yldR.push(yS[i]-yS[i-1]);}
      const sb30=calcCorrN(spxR,yldR,30);
      if(sb30!=null&&sb30>0.2)risks.push({severity:'ELEVATED',color:'var(--wn)',title:`Stock-bond correlation positive (${sb30.toFixed(2)})`,detail:`Bonds are not hedging equities in the current regime. Traditional 60/40 portfolios have elevated risk. Consider alternative diversifiers like gold or uncorrelated strategies.`});}}
  return risks.sort((a,b)=>{const sev={CRITICAL:4,HIGH:3,ELEVATED:2,MONITOR:1,LOW:0};return(sev[b.severity]||0)-(sev[a.severity]||0);}).slice(0,6);
}

// === BACKTEST TRACK RECORD ===
function getBtHistory(){try{return JSON.parse(localStorage.getItem('mktOutlookBT')||'[]');}catch{return[];}}
function saveBtEntry(results){
  const today=new Date().toISOString().slice(0,10);
  const hist=getBtHistory();
  if(hist.find(e=>e.date===today))return; // already logged today
  const entry={date:today,predictions:{}};
  for(const a of ASSETS){const r=results[a.id];if(!r)continue;
    entry.predictions[a.id]={px:r.px,wk:r.wk,mo:r.mo,yr:r.yr};}
  hist.push(entry);if(hist.length>365)hist.shift();
  localStorage.setItem('mktOutlookBT',JSON.stringify(hist));
}
function scoreBtHistory(results){
  const hist=getBtHistory();if(hist.length<2)return{entries:hist,scored:[],hitRate:null,avgErr:null,count:0};
  const scored=[];
  for(let i=0;i<hist.length-1;i++){
    const entry=hist[i],nextWeek=hist.find(e=>{ const d1=new Date(entry.date),d2=new Date(e.date);return(d2-d1)>=4*86400000&&(d2-d1)<=10*86400000;});
    if(!nextWeek)continue;
    for(const id in entry.predictions){
      const pred=entry.predictions[id],actual=nextWeek.predictions[id];
      if(!pred||!actual)continue;
      const predDir=pred.wk>0?1:-1;
      const actualRet=(actual.px-pred.px)/pred.px*100;
      const actualDir=actualRet>0?1:-1;
      const hit=predDir===actualDir;
      scored.push({date:entry.date,asset:id,predScore:pred.wk,actualRet,hit});
    }
  }
  const hits=scored.filter(s=>s.hit).length;
  return{entries:hist,scored,hitRate:scored.length?hits/scored.length:null,avgErr:scored.length?scored.reduce((s,e)=>s+Math.abs(e.actualRet),0)/scored.length:null,count:scored.length};
}
function buildBacktestPane(results){
  saveBtEntry(results);
  const bt=scoreBtHistory(results);
  let html=`<div class="bt-wrap"><div class="c" style="margin-bottom:18px;"><div class="c-title">Track Record — Prediction Accuracy</div>
    <p style="font-size:0.85em;color:var(--txd);line-height:1.7;margin:10px 0;">Each day you load this dashboard, your weekly directional predictions are logged. When enough data accumulates (~1 week+), accuracy is scored by comparing predicted direction vs actual returns.</p></div>`;
  if(bt.count===0){
    html+=`<div class="bt-empty">No scored predictions yet. Come back in a week to see your first accuracy readings.<br><br><span style="color:var(--ac);">${bt.entries.length} snapshot${bt.entries.length!==1?'s':''} logged.</span></div>`;
  } else {
    const hrPct=bt.hitRate!=null?(bt.hitRate*100).toFixed(1)+'%':'—';
    const hrColor=bt.hitRate>0.55?'var(--up)':bt.hitRate<0.45?'var(--dn)':'var(--wn)';
    html+=`<div class="bt-summary">
      <div class="bt-stat"><div class="bt-val" style="color:${hrColor}">${hrPct}</div><div class="bt-lbl">Hit Rate</div></div>
      <div class="bt-stat"><div class="bt-val">${bt.count}</div><div class="bt-lbl">Scored Calls</div></div>
      <div class="bt-stat"><div class="bt-val">${bt.entries.length}</div><div class="bt-lbl">Snapshots</div></div>
      <div class="bt-stat"><div class="bt-val">${bt.avgErr!=null?bt.avgErr.toFixed(2)+'%':'—'}</div><div class="bt-lbl">Avg |Move|</div></div>
    </div>`;
    html+=`<div class="c"><div class="c-title">Recent Scored Predictions</div><div class="bt-chart-wrap"><canvas id="btChart"></canvas></div>
      <table class="bt-table"><thead><tr><th>Date</th><th>Asset</th><th>Pred</th><th>Actual</th><th>Hit?</th></tr></thead><tbody>`;
    bt.scored.slice(-30).reverse().forEach(s=>{
      const a=ASSETS.find(x=>x.id===s.asset);
      html+=`<tr><td>${s.date}</td><td style="color:${a?.color||'var(--tx)'}">${a?.short||s.asset}</td>
        <td class="${s.predScore>0?'c-up':'c-dn'}">${s.predScore>0?'BULL':'BEAR'} (z ${s.predScore.toFixed(2)})</td>
        <td class="${s.actualRet>0?'c-up':'c-dn'}">${s.actualRet>0?'+':''}${s.actualRet.toFixed(2)}%</td>
        <td>${s.hit?'<span class="c-up">✓</span>':'<span class="c-dn">✗</span>'}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;return html;
}
function drawBtChart(){
  const bt=scoreBtHistory(window._res);if(bt.count<2)return;
  const ctx=document.getElementById('btChart')?.getContext('2d');if(!ctx)return;
  // Rolling hit rate over time
  const dates=[...new Set(bt.scored.map(s=>s.date))].sort();
  const rolling=[];let cumHits=0,cumTotal=0;
  for(const d of dates){const day=bt.scored.filter(s=>s.date===d);cumTotal+=day.length;cumHits+=day.filter(s=>s.hit).length;rolling.push({date:d,rate:cumTotal?cumHits/cumTotal:0});}
  if(window._ci?.btChart){window._ci.btChart.destroy();delete window._ci.btChart;}
  window._ci.btChart=new Chart(ctx,{type:'line',data:{labels:rolling.map(r=>r.date),datasets:[{label:'Cumulative Hit Rate',data:rolling.map(r=>(r.rate*100).toFixed(1)),borderColor:'var(--ac)',backgroundColor:'rgba(0,156,220,0.08)',fill:true,tension:.3,pointRadius:2,borderWidth:2},{label:'50% Baseline',data:rolling.map(()=>50),borderColor:'rgba(255,255,255,0.1)',borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#5a7a95',font:{family:'JetBrains Mono',size:11}}}},scales:{x:{ticks:{color:'#5a7a95',maxTicksLimit:8,font:{family:'JetBrains Mono',size:10}},grid:{color:'rgba(255,255,255,0.02)'}},y:{min:0,max:100,ticks:{color:'#5a7a95',font:{family:'JetBrains Mono',size:10},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.02)'}}}}});
}

      const lines=doc.splitTextToSize(text.replace(/<[^>]*>/g,''),pw-6);
      if(y+lines.length*3.5>278){doc.addPage();y=15;}
      doc.text('•',lm,y);doc.text(lines,lm+5,y);y+=lines.length*3.3+1.5;
    }

    // ══════════════════════════════════════════════════
    // PAGE 1: HEADER + PUNCHLINE
    // ══════════════════════════════════════════════════
    const topAdds=byMo.slice(0,3).map(a=>a.short);
    const topCuts=byMo.slice(-3).reverse().map(a=>a.short);
    doc.setFillColor(0,58,102);doc.rect(0,0,210,22,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(255,255,255);
    doc.text('CAGAN CAPITAL — POSITIONING NOTE',lm,13);
    const regCol2=avgMo>0.25?[58,159,216]:avgMo>-0.25?[110,137,168]:[196,77,94];
    doc.setFillColor(...regCol2);doc.rect(72,6,28,8,'F');
    doc.setFontSize(7);doc.setTextColor(18,20,28);doc.text(regime.toUpperCase(),86,11.5,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(160,165,180);
    doc.text(`${dateStr} | ${bullCount} add / ${bearCount} reduce / ${available.length} assets`,lm,19);
    y=28;

    // ── THE CALL (2-3 lines, bold, no preamble) ──
    doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(30,30,45);
    let punch2='';
    if(avgMo>1.0)punch2=`Add risk across the board. ${topAdds.join(', ')} lead. Cut ${topCuts.join(', ')}. ${bullCount}/${available.length} assets in add territory.`;
    else if(avgMo>0.25)punch2=`Overweight selectively. ${topAdds[0]} offers the best risk/reward. Avoid ${topCuts[0]}. ${wkVsMo<-0.25?'Weekly momentum fading — don\'t chase.':'Weekly confirms direction.'}`;
    else if(avgMo>-0.25)punch2=`Pair trade: buy ${topAdds[0]}, sell ${topCuts[0]}. Express the spread between leaders and laggards. ${Math.abs(wkVsMo)>0.25?'Key: weekly '+(wkVsMo>0?'improving — add '+topAdds[0]+' on dips':'deteriorating — tighten stops on '+topCuts[0])+'.':'Weekly confirms monthly — size for conviction.'}`;
    else punch2=`Defensive posture. ${bearCount}/${available.length} in reduce zone. Cut ${topCuts.join(', ')}. Only bright spots: ${topAdds.slice(0,2).join(', ')}.`;
    const pL2=doc.splitTextToSize(punch2,pw);doc.text(pL2,lm,y);y+=pL2.length*4.2+3;

    // ── WHAT CHANGED (tight, implication-first) ──
    doc.setDrawColor(0,156,220);doc.setLineWidth(0.3);doc.line(lm,y,lm+30,y);doc.setLineWidth(0.2);y+=4;
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(80,100,200);
    doc.text("WHAT'S DIFFERENT",lm,y);y+=4.5;
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(45,45,55);
    const shifts=available.map(a=>({a,shift:res[a.id].wk-res[a.id].mo,wk:res[a.id].wk,mo:res[a.id].mo,r1w:res[a.id].r1w})).sort((x,y2)=>Math.abs(y2.shift)-Math.abs(x.shift));
    const bigShifts=shifts.filter(s=>Math.abs(s.shift)>0.3).slice(0,4);
    if(bigShifts.length){
      bigShifts.forEach(s=>{
        const dir=s.shift>0;const imp=dir&&s.mo<-0.25?'Possible reversal — watch for add.':dir?'Trend accelerating.':!dir&&s.mo>0.5?'Fade risk. Tighten.':'Weakness deepening.';
        const col=dir?[30,150,90]:[200,60,60];doc.setTextColor(...col);doc.text(dir?'▲':'▼',lm,y);
        doc.setTextColor(45,45,55);doc.text(`${s.a.short}: ${Math.abs(s.shift).toFixed(2)} z-pts ${dir?'better':'worse'} weekly vs month. ${imp}`,lm+5,y);y+=3.5;
      });
    }else{doc.text('No major shifts. Trend intact. Hold current positioning.',lm,y);y+=3.5;}
    const ob=available.filter(a=>res[a.id].cRSI>70).map(a=>a.short);
    const os=available.filter(a=>res[a.id].cRSI<30).map(a=>a.short);
    if(ob.length){doc.setTextColor(200,60,60);doc.text('⚠',lm,y);doc.setTextColor(45,45,55);doc.text(`Overbought: ${ob.join(', ')}. Take partial profits.`,lm+5,y);y+=3.5;}
    if(os.length){doc.setTextColor(30,150,90);doc.text('⚠',lm,y);doc.setTextColor(45,45,55);doc.text(`Oversold: ${os.join(', ')}. Contrarian add if thesis holds.`,lm+5,y);y+=3.5;}
    y+=3;

    // ── POSITIONING CALLS (tight table format) ──
    addSection('Positioning Calls');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(30,130,90);
    doc.text('ADD',lm,y);doc.setTextColor(100,100,115);doc.setFont('helvetica','normal');doc.setFontSize(6.5);
    doc.text('ASSET',lm+12,y);doc.text('SIGNAL',lm+32,y);doc.text('1W',lm+52,y);doc.text('RSI',lm+64,y);doc.text('WHY',lm+76,y);y+=3.5;
    byMo.slice(0,5).forEach(a=>{const r2=res[a.id];
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(30,130,90);doc.text(a.short,lm+12,y);
      doc.setFont('helvetica','normal');doc.setTextColor(45,45,55);doc.text(sig(r2.mo),lm+32,y);
      doc.setTextColor(r2.r1w>=0?30:200,r2.r1w>=0?130:60,r2.r1w>=0?90:60);doc.text(fp3(r2.r1w),lm+52,y);
      doc.setTextColor(45,45,55);doc.text(r2.cRSI?.toFixed(0)||'—',lm+64,y);
      const why=r2.r1w>0&&r2.yr>0.15?'Add — momentum + structure aligned':r2.r1w>0?'Add tactically — near-term momentum':r2.yr>0.15?'Accumulate on dips — structural bid':'Underweight — fighting the trend';
      doc.setTextColor(80,80,95);doc.text(why,lm+76,y);y+=3.2;
    });
    y+=3;doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(200,60,60);
    doc.text('CUT',lm,y);doc.setTextColor(100,100,115);doc.setFont('helvetica','normal');doc.setFontSize(6.5);
    doc.text('ASSET',lm+12,y);doc.text('SIGNAL',lm+32,y);doc.text('1W',lm+52,y);doc.text('RSI',lm+64,y);doc.text('WHY',lm+76,y);y+=3.5;
    byMo.slice(-5).reverse().forEach(a=>{const r2=res[a.id];
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(200,60,60);doc.text(a.short,lm+12,y);
      doc.setFont('helvetica','normal');doc.setTextColor(45,45,55);doc.text(sig(r2.mo),lm+32,y);
      doc.setTextColor(r2.r1w>=0?30:200,r2.r1w>=0?130:60,r2.r1w>=0?90:60);doc.text(fp3(r2.r1w),lm+52,y);
      doc.setTextColor(45,45,55);doc.text(r2.cRSI?.toFixed(0)||'—',lm+64,y);
      const why=r2.r1w<0?'Selling accelerating':r2.mo<-0.3?'Deep negative — stay away':'Bounce likely sell-the-rip';
      doc.setTextColor(80,80,95);doc.text(why,lm+76,y);y+=3.2;
    });

    // ── EQUITY-BOND ROTATION ──
    addSection('Stocks vs Bonds');
    const eqIds=['sp500','iwm','eem','efa','vug','vtv','vym','vymi'].filter(id=>res[id]);
    const bondIds2=['agg','tlt','vgsh'].filter(id=>res[id]);
    if(eqIds.length&&bondIds2.length){
      const eqAvg=eqIds.reduce((s,id)=>s+res[id].mo,0)/eqIds.length;
      const bdAvg=bondIds2.reduce((s,id)=>s+res[id].mo,0)/bondIds2.length;
      const spread=eqAvg-bdAvg;
      let call=spread>0.6?'Overweight equities.'+(res.tlt&&res.tlt.mo<-0.5?' Short duration only (VGSH) for bonds.':'')
        :spread<-0.5?'Add duration. Bonds leading.':'Express via best-in-class from each — pick strongest equity and strongest bond.';
      addPara(`${call} Eq z ${eqAvg.toFixed(2)} vs FI z ${bdAvg.toFixed(2)}, spread ${spread.toFixed(2)}.`,9,true);
    }

    // ── US vs INTERNATIONAL ──
    addSection('Geography');
    const usIds2=['sp500','iwm','vug','vtv','vym'].filter(id=>res[id]);
    const intlIds2=['eem','efa','vymi'].filter(id=>res[id]);
    if(usIds2.length&&intlIds2.length){
      const usMo=usIds2.reduce((s,id)=>s+res[id].mo,0)/usIds2.length;
      const intlMo=intlIds2.reduce((s,id)=>s+res[id].mo,0)/intlIds2.length;
      const gap=usMo-intlMo;
      let call2=gap>0.5?'OW US.':gap<-0.4?'Intl catching up — add EEM/EFA.':'Pick best from each region.';
      let dxyNote=res.dxy?` USD ${fp3(res.dxy.r1w)} 1W${res.dxy.r1w>0.3?' (intl headwind)':res.dxy.r1w<-0.3?' (intl tailwind)':''}.`:'';
      addPara(`${call2} US z ${usMo.toFixed(2)} vs Intl z ${intlMo.toFixed(2)}, gap ${Math.abs(gap).toFixed(2)}.${dxyNote}`);
    }

    // ── STYLE ──
    addSection('Style');
    if(res.vug&&res.vtv){
      const gR=res.vug,vR=res.vtv;const gvS=gR.mo-vR.mo;
      let call3=gvS>0.5?'OW growth (VUG).':gvS<-0.4?'Rotate to value (VTV) — favor cyclicals.':'Own both — slight tilt '+(gvS>=0?'VUG':'VTV')+'.';
      addPara(`${call3} VUG z ${gR.mo.toFixed(2)} vs VTV z ${vR.mo.toFixed(2)}, spread ${Math.abs(gvS).toFixed(2)}.${res.vym?' VYM z '+res.vym.mo.toFixed(2)+'.':''}`);
    }

    // ── COMMODITIES ──
    addSection('Commodities');
    const commIds2=['gld','slv','weat','uso'].filter(id=>res[id]);
    if(commIds2.length){
      const commAvg=commIds2.reduce((s,id)=>s+res[id].mo,0)/commIds2.length;
      const bestC=commIds2.reduce((b,id)=>res[id].mo>res[b].mo?id:b,commIds2[0]);const bcN=ASSETS.find(x=>x.id===bestC);
      let call4=commAvg>0.15?`Add ${bcN?bcN.short:'GLD'} as lead commodity position.`:commAvg<-0.15?`Trim commodity exposure. ${bcN?bcN.short:'GLD'} is the only hold.`:`${bcN?bcN.short:'GLD'} is the pick — maintain small tactical allocation, add on weakness.`;
      addPara(`${call4} ${commIds2.map(id=>{const a=ASSETS.find(x=>x.id===id);return a.short+' '+sig(res[id].mo);}).join(', ')}.`);
    }

    // ── CRYPTO ──
    if(res.ibit||res.etha){
      addSection('Crypto');
      const cryptoAvg=((res.ibit?.mo||0)+(res.etha?.mo||0))/(res.ibit&&res.etha?2:1);
      let call5=cryptoAvg>0.2?'Risk-on. Add if vol-tolerant.':cryptoAvg<-0.15?'Risk off. No new crypto.':'Tracking risk sentiment.';
      addPara(`${call5}${res.ibit?' BTC '+sig(res.ibit.mo)+' ('+fp3(res.ibit.r1w)+' 1W).':''}${res.etha?' ETH '+sig(res.etha.mo)+'.':''}`);
    }

    // ── CORRELATION ──
    if(window._corrData?.pairs?.length){
      addSection('Correlation');
      const cp=window._corrData.pairs.filter(p=>p.c30!=null);
      if(cp.length){
        const avgC30=cp.reduce((s,p)=>s+p.c30,0)/cp.length;
        const top1=[...cp].sort((a,b)=>b.c30-a.c30)[0];
        const div1=[...cp].sort((a,b)=>a.c30-b.c30)[0];
        let call6=avgC30>0.4?'High correlation — diversification limited. Cut redundant pairs.':avgC30>0.2?'Moderate. Some diversification.':'Low. Multi-asset working.';
        addPara(`${call6} Avg 30d: ${avgC30.toFixed(2)}. Most correlated: ${top1.a.short}/${top1.b.short} ${top1.c30.toFixed(2)}. Best diversifier: ${div1.a.short}/${div1.b.short} ${div1.c30.toFixed(2)}.`);
      }
    }

    // ── STRUCTURAL VIEW ──
    addSection('Structural (1Y+)');
    const byYr=[...available].sort((a,b)=>res[b.id].yr-res[a.id].yr);
    let structCall=avgYr>avgMo+0.05?'Longer-term more constructive than near-term.':avgYr<avgMo-0.05?'Structural caution — near-term strength may fade.':'Aligned across horizons.';
    addPara(`${structCall} 1Y leaders: ${byYr.slice(0,3).map(a=>a.short+' '+res[a.id].yr.toFixed(2)+'%').join(', ')}. Use monthly for timing.`);

    // ── RISKS ──
    addSection('Risks');
    const risks=buildRisksToMonitor(res);
    if(risks.length){risks.slice(0,3).forEach(rk=>{
      doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(45,45,55);
      if(y>275){doc.addPage();y=15;}
      doc.text(`• [${rk.severity}] ${rk.title}`,lm,y);y+=3.2;
    });}
    else{addBullet('No flags. Complacency is the risk.',7.5);}

    // ── BOTTOM LINE ──
    addSection('Bottom Line');
    let conclusion='';
    if(avgMo>0.15)conclusion=`Add risk. Lead with ${topAdds.join(', ')}. Cut ${topCuts.join(', ')}. Don't chase — add on pullbacks.`;
    else if(avgMo>-0.15)conclusion=`Hold. Add only ${topAdds[0]}. Trim ${topCuts[0]}. Cash is alpha.`;
    else conclusion=`Reduce. Cut ${topCuts.join(', ')}. Favor ${topAdds.slice(0,2).join(', ')} as havens. Wait for weekly to confirm before re-risking.`;
    addPara(conclusion,10,true);

    // ── FOOTER ──
    const pageCount=doc.getNumberOfPages();
    for(let p=1;p<=pageCount;p++){
      doc.setPage(p);
      doc.setFontSize(6);doc.setTextColor(150,150,160);
      doc.text(`Multi-Asset Positioning Note | ${dateStr} | Page ${p}/${pageCount}`,lm,290);
      doc.text('Forward-looking positioning signals. Not financial advice.',rm,290,{align:'right'});
    }

    doc.save(`Investment-Note-${now.toISOString().slice(0,10)}.pdf`);
    if(st)st.textContent='Investment Note downloaded!';
  }catch(e){console.error('Investment Note error:',e);if(st)st.textContent='Error: '+e.message;}
}

// ═══ CROSS-ASSET VIEWS ═══
function buildCrossAssetPane(results){
  const tfs=['wk','mo','yr','y3','y5','y10'];
  const tfLabels={wk:'Week',mo:'Month',yr:'Year',y3:'3Y',y5:'5Y',y10:'10Y'};
  let html=`<div style="max-width:1100px;margin:0 auto;">
    <h2 style="margin-bottom:6px;">Cross-Asset Relative Views</h2>
    <p style="font-size:0.85em;color:var(--txd);line-height:1.7;margin-bottom:20px;">Paired comparisons to guide allocation decisions. Each view shows which side of the trade scores higher across all horizons, plus the spread chart and key takeaway.</p>
    <div class="ca-hz-bar" style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
      <span style="font-family:var(--mn);font-size:0.72em;color:var(--txd);text-transform:uppercase;letter-spacing:1px;">Horizon</span>
      ${tfs.map(k=>`<button class="impl-hz-btn ca-hz-btn${k==='mo'?' active':''}" data-cahz="${k}" onclick="setCrossHorizon('${k}')">${tfLabels[k]}</button>`).join('')}
    </div>`;
  const assetMap=Object.fromEntries(ASSETS.map(a=>[a.id,a]));
  CROSS_PAIRS.forEach(pair=>{
    const rA=results[pair.a],rB=results[pair.b];
    const aInfo=assetMap[pair.a],bInfo=assetMap[pair.b];
    if(!rA||!rB||!aInfo||!bInfo){html+=`<div class="c" style="margin-bottom:18px;opacity:.5;padding:20px;"><span>${pair.name}: data unavailable</span></div>`;return;}
    // Horizon heatmap row for both assets
    function hmColor(s){return s>0.3?'#15803d':s>0.15?'#22c55e':s>0.05?'#4ade80':s>-0.05?'#374151':s>-0.15?'#f87171':s>-0.3?'#ef4444':'#b91c1c';}
    function sigLabel(s){return s>1.5?'STRONG ADD':s>0.5?'ADD':s>-0.5?'NEUTRAL':s>-1.5?'REDUCE':'STRONG REDUCE';}
    // Default tf = mo
    const tf='mo';
    const scoreA=rA[tf],scoreB=rB[tf];
    const spread=scoreA-scoreB;
    const winner=spread>0.05?aInfo.short:spread<-0.05?bInfo.short:'Neutral';
    const winColor=spread>0.05?'var(--up)':spread<-0.05?'var(--dn)':'var(--wn)';
    // Build heatmap rows for both
    function hmRow(info,r){
      return tfs.map(k=>{
        const s=r[k]!=null?r[k]:0;
        return `<div style="text-align:center;padding:6px 10px;border-radius:4px;background:${hmColor(s)};min-width:52px;">
          <div style="font-family:var(--mn);font-size:0.68em;color:rgba(255,255,255,.6);">${tfLabels[k]}</div>
          <div style="font-family:var(--mn);font-size:0.82em;font-weight:700;color:#fff;">${s.toFixed(2)}</div>
        </div>`;
      }).join('');
    }
    // Spread across horizons
    let spreadRow=tfs.map(k=>{
      const sp=(rA[k]||0)-(rB[k]||0);
      const c=sp>0.05?'var(--up)':sp<-0.05?'var(--dn)':'var(--wn)';
      return `<div style="text-align:center;padding:6px 10px;min-width:52px;">
        <div style="font-family:var(--mn);font-size:0.68em;color:var(--txd);">${tfLabels[k]}</div>
        <div style="font-family:var(--mn);font-size:0.82em;font-weight:700;color:${c};">${sp>=0?'+':''}${(sp*100).toFixed(0)}pp</div>
      </div>`;
    }).join('');
    // Takeaway
    const moSpread=(rA.mo||0)-(rB.mo||0);
    const yrSpread=(rA.yr||0)-(rB.yr||0);
    let takeaway='';
    if(moSpread>0.1&&yrSpread>0.1)takeaway=`${aInfo.short} dominates across horizons. Overweight vs ${bInfo.short}.`;
    else if(moSpread<-0.1&&yrSpread<-0.1)takeaway=`${bInfo.short} leads on all timeframes. Favor ${bInfo.short} over ${aInfo.short}.`;
    else if(moSpread>0.1&&yrSpread<-0.05)takeaway=`Near-term favors ${aInfo.short}, but longer-term thesis supports ${bInfo.short}. Tactical vs strategic divergence.`;
    else if(moSpread<-0.1&&yrSpread>0.05)takeaway=`${bInfo.short} has near-term edge, but ${aInfo.short} is structurally stronger. Consider time horizon.`;
    else takeaway=`${aInfo.short} and ${bInfo.short} are closely matched — own both, tilt toward ${moSpread>=0?aInfo.short:bInfo.short} (better near-term z-score). Add whichever pulls back first.`;
    // Sparkline canvases
    html+=`<div class="c ca-pair" data-pair="${pair.id}" style="margin-bottom:18px;padding:22px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div>
          <div style="font-size:1.05em;font-weight:700;color:var(--txb);margin-bottom:2px;">${pair.name}</div>
          <div style="font-size:0.82em;color:var(--txd);">${pair.desc}</div>
        </div>
        <div style="text-align:right;">
          <div class="ca-call" data-pair="${pair.id}" style="font-family:var(--mn);font-size:0.88em;font-weight:700;color:${winColor};">Favor: ${winner}</div>
          <div class="ca-spread-label" data-pair="${pair.id}" style="font-family:var(--mn);font-size:0.72em;color:var(--txd);">Spread: ${spread>=0?'+':''}${(spread*100).toFixed(0)}pp</div>
        </div>
      </div>
      <div style="display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;">
        <div style="flex:1;min-width:260px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="width:10px;height:10px;border-radius:50%;background:${aInfo.color};display:inline-block;"></span>
            <span style="font-family:var(--mn);font-size:0.82em;font-weight:600;color:${aInfo.color};">${aInfo.short}</span>
            <span style="font-family:var(--mn);font-size:0.72em;color:var(--txd);">$${rA.px>=1000?rA.px.toFixed(0):rA.px.toFixed(2)}</span>
          </div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">${hmRow(aInfo,rA)}</div>
        </div>
        <div style="flex:1;min-width:260px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">

function setCrossHorizon(tf){
  window._caTF=tf;
  document.querySelectorAll('.ca-hz-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.ca-hz-btn[data-cahz="${tf}"]`)?.classList.add('active');

  const tfLabels={wk:'Week',mo:'Month',yr:'Year',y3:'3Y',y5:'5Y',y10:'10Y'};
  CROSS_PAIRS.forEach(pair=>{

    if(!rA||!rB||!aInfo||!bInfo)return;
    const scoreA=rA[tf]||0,scoreB=rB[tf]||0;
    const spread=scoreA-scoreB;
    const winner=spread>0.05?aInfo.short:spread<-0.05?bInfo.short:'Neutral';
    const winColor=spread>0.05?'var(--up)':spread<-0.05?'var(--dn)':'var(--wn)';
    // Update call
    const callEl=document.querySelector(`.ca-call[data-pair="${pair.id}"]`);
    if(callEl){callEl.textContent='Favor: '+winner;callEl.style.color=winColor;}
    const spreadEl=document.querySelector(`.ca-spread-label[data-pair="${pair.id}"]`);
    if(spreadEl)spreadEl.textContent=`Spread: ${spread>=0?'+':''}${(spread*100).toFixed(0)}pp`;
    // Update takeaway
    const moSp=(rA[tf]||0)-(rB[tf]||0);
    const yrSp=(rA.yr||0)-(rB.yr||0);
    let tk='';
    if(moSp>0.1&&yrSp>0.1)tk=`${aInfo.short} dominates across horizons. Overweight vs ${bInfo.short}.`;
    else if(moSp<-0.1&&yrSp<-0.1)tk=`${bInfo.short} leads on all timeframes. Favor ${bInfo.short} over ${aInfo.short}.`;
    else if(moSp>0.1&&yrSp<-0.05)tk=`Near-term favors ${aInfo.short}, but longer-term thesis supports ${bInfo.short}. Tactical vs strategic divergence.`;
    else if(moSp<-0.1&&yrSp>0.05)tk=`${bInfo.short} has near-term edge, but ${aInfo.short} is structurally stronger. Consider time horizon.`;
    else tk=`${aInfo.short} and ${bInfo.short} closely matched — own both, tilt toward ${moSp>=0?aInfo.short:bInfo.short}. Add whichever dips first.`;
    const tkEl=document.querySelector(`.ca-takeaway[data-pair="${pair.id}"]`);
    if(tkEl)tkEl.textContent=tk;
  });
}

function saveSnapshot(results){
  try{
    const today=new Date().toISOString().slice(0,10);
    const snap={};
    ASSETS.forEach(a=>{if(results[a.id])snap[a.id]={mo:results[a.id].mo,wk:results[a.id].wk,yr:results[a.id].yr,px:results[a.id].px,r1w:results[a.id].r1w};});
    const history=JSON.parse(localStorage.getItem('mktpos_history')||'{}');
    history[today]=snap;
    // Keep only last 30 days
    const keys=Object.keys(history).sort().slice(-30);
    const trimmed={};keys.forEach(k=>trimmed[k]=history[k]);
    localStorage.setItem('mktpos_history',JSON.stringify(trimmed));
  }catch(e){console.warn('snapshot save fail',e);}
}
function getSnapshotDeltas(results){
  try{
    const history=JSON.parse(localStorage.getItem('mktpos_history')||'{}');
    const dates=Object.keys(history).sort();
    if(dates.length<2)return null;
    const today=dates[dates.length-1];
    const prev=dates[dates.length-2];
    const todayS=history[today],prevS=history[prev];
    if(!todayS||!prevS)return null;
    const deltas=[];
    ASSETS.forEach(a=>{
      if(todayS[a.id]&&prevS[a.id]){
        const d=todayS[a.id].mo-prevS[a.id].mo;
        if(Math.abs(d)>0.02)deltas.push({asset:a,delta:d,from:prevS[a.id].mo,to:todayS[a.id].mo,prevPx:prevS[a.id].px,nowPx:todayS[a.id].px});
      }
    });
    deltas.sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
    return{deltas,prevDate:prev,todayDate:today};
  }catch(e){return null;}
}
function buildSignalChangeLog(results){

  function sigColor(s){return s>0.5?'var(--up)':s<-0.5?'var(--dn)':'var(--wn)';}
  data.deltas.slice(0,10).forEach(d=>{

function buildDrawdownMonitor(results){
  let html=`<div class="c" style="margin-bottom:18px;"><div class="c-title">Drawdown Monitor</div>
    <p style="font-size:0.78em;color:var(--txd);margin-bottom:12px;">Current drawdown from recent peak (252-day lookback).</p>`;

    const cl=results[a.id].closesAll;

    lookback.forEach(v=>{if(v>peak)peak=v;});

  }).sort((a,b)=>a.dd-b.dd);

function buildCorrWarnings(results){

  const ranked=ASSETS.filter(a=>results[a.id]).sort((a,b)=>(results[b.id].mo||0)-(results[a.id].mo||0));

        rB.closesAll.slice(-60).map((v,k,arr)=>k>0?(v-arr[k-1])/arr[k-1]:0).slice(1),

// ═══ RISK BUDGET VISUALIZATION ═══
function buildRiskBudget(results){
  const available=ASSETS.filter(a=>results[a.id]&&results[a.id].closesAll&&results[a.id].closesAll.length>30);
  // Compute annualized vol for each asset (from 60d daily returns)
  const vols=available.map(a=>{
    const cl=results[a.id].closesAll.slice(-60);
    const rets=[];for(let i=1;i<cl.length;i++)rets.push((cl[i]-cl[i-1])/cl[i-1]);
    const mean=rets.reduce((s,v)=>s+v,0)/rets.length;
    const variance=rets.reduce((s,v)=>s+(v-mean)**2,0)/rets.length;
    const dailyVol=Math.sqrt(variance);
    const annVol=dailyVol*Math.sqrt(252)*100;
    return{asset:a,annVol,score:results[a.id].mo||0};
  }).sort((a,b)=>b.annVol-a.annVol);
  const maxVol=Math.max(...vols.map(v=>v.annVol),1);
  let html=`<div class="c" style="margin-bottom:18px;"><div class="c-title">Volatility Profile (60d Ann.)</div>
    <p style="font-size:0.78em;color:var(--txd);margin-bottom:12px;">Higher vol = more portfolio risk per dollar allocated. Pairing signal with vol helps size positions.</p>`;
  vols.forEach(v=>{
    const pct=v.annVol/maxVol*100;
    const sigCol=v.score>0.75?'var(--up)':v.score<-0.75?'var(--dn)':'var(--wn)';
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;">
      <span style="color:${v.asset.color};font-weight:600;min-width:50px;font-size:0.82em;">${v.asset.short}</span>
      <div style="flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${v.annVol>40?'var(--dn)':v.annVol>20?'var(--wn)':'var(--up)'};border-radius:4px;"></div>
      </div>
      <span style="font-family:var(--mn);font-size:0.75em;color:var(--txd);min-width:48px;text-align:right;">${v.annVol.toFixed(1)}%</span>
      <span style="font-family:var(--mn);font-size:0.68em;min-width:40px;text-align:center;color:${sigCol};">${v.score.toFixed(2)}</span>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

    </div>`;

// ═══ ENHANCED CROSS-ASSET WITH Z-SCORES ═══
function drawCrossSpreadZScore(pair,results){
  const rA=results[pair.a],rB=results[pair.b];
  if(!rA||!rB||!rA.closesAll||!rB.closesAll)return;
  const cv=document.getElementById('ca-spark-'+pair.id);if(!cv)return;
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  cv.width=cv.offsetWidth*dpr;cv.height=90*dpr;
  ctx.scale(dpr,dpr);
  const w=cv.offsetWidth,h=90;
  const lenA=rA.closesAll.length,lenB=rB.closesAll.length;
  const len=Math.min(lenA,lenB,750);// 3y
  const ratio=[];
  for(let i=0;i<len;i++){
    const idxA=lenA-len+i,idxB=lenB-len+i;
    if(rB.closesAll[idxB]!==0)ratio.push(rA.closesAll[idxA]/rB.closesAll[idxB]);
  }
  if(ratio.length<30)return;
  // Compute rolling mean and std (252d) for z-score bands
  const period=Math.min(252,ratio.length-1);
  const means=[],stds=[];
  for(let i=0;i<ratio.length;i++){
    if(i<period-1){means.push(null);stds.push(null);continue;}
    const window=ratio.slice(i-period+1,i+1);
    const m=window.reduce((s,v)=>s+v,0)/window.length;
    const std=Math.sqrt(window.reduce((s,v)=>s+(v-m)**2,0)/window.length);
    means.push(m);stds.push(std);
  }
  const allVals=[...ratio];
  means.forEach((m,i)=>{if(m!==null&&stds[i]!==null){allVals.push(m+2*stds[i]);allVals.push(m-2*stds[i]);}});
  const mn=Math.min(...allVals.filter(v=>v!=null&&isFinite(v)));
  const mx=Math.max(...allVals.filter(v=>v!=null&&isFinite(v)));
  const rng=mx-mn||1;
  ctx.clearRect(0,0,w,h);
  const toX=i=>i/(ratio.length-1)*w;
  const toY=v=>h-6-((v-mn)/rng)*(h-12);
  // Draw ±2σ band
  ctx.beginPath();
  let started=false;
  for(let i=0;i<ratio.length;i++){
    if(means[i]===null)continue;
    const x=toX(i),y=toY(means[i]+2*stds[i]);
    if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
  }
  for(let i=ratio.length-1;i>=0;i--){
    if(means[i]===null)continue;
    ctx.lineTo(toX(i),toY(means[i]-2*stds[i]));
  }
  ctx.fillStyle='rgba(0,156,220,0.08)';ctx.fill();
  // Draw mean line
  ctx.beginPath();started=false;
  for(let i=0;i<ratio.length;i++){
    if(means[i]===null)continue;
    const x=toX(i),y=toY(means[i]);
    if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
  }
  ctx.strokeStyle='rgba(0,156,220,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  // Draw ratio line
  ctx.beginPath();
  ratio.forEach((v,i)=>{const x=toX(i),y=toY(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  const endV=ratio[ratio.length-1],startV=ratio[0];
  const up2=endV>=startV;
  const assetMap=Object.fromEntries(ASSETS.map(a=>[a.id,a]));
  ctx.strokeStyle=up2?(assetMap[pair.a]?.color||'#009CDC'):(assetMap[pair.b]?.color||'#c44d5e');
  ctx.lineWidth=1.5;ctx.stroke();
  // Z-score label
  const lastM=means[means.length-1],lastS=stds[stds.length-1];
  const lastR=ratio[ratio.length-1];
  if(lastM!==null&&lastS!==null&&lastS>0){
    const z=(lastR-lastM)/lastS;
    ctx.font='bold 10px monospace';ctx.textAlign='right';
    ctx.fillStyle=Math.abs(z)>1.5?'rgb(196,77,94)':Math.abs(z)>1?'rgb(110,137,168)':'rgba(255,255,255,.5)';
    ctx.fillText(`z: ${z>=0?'+':''}${z.toFixed(2)}`,w-4,h-4);
  }
  // Labels
  ctx.font='10px monospace';ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.textAlign='left';ctx.fillText(`${pair.short} ratio (3Y) ±2σ`,4,12);
  const pctChg=(endV-startV)/startV*100;
  ctx.textAlign='right';ctx.fillStyle=up2?'rgb(58,159,216)':'rgb(196,77,94)';
  ctx.fillText(`${pctChg>=0?'+':''}${pctChg.toFixed(1)}%`,w-4,12);
}

function copyAsMarkdown(){
  const res=window._res;if(!res)return;
  const available=ASSETS.filter(a=>res[a.id]);
  const avgMo=available.reduce((s,a)=>s+res[a.id].mo,0)/available.length;
  const byMo=[...available].sort((a,b)=>res[b.id].mo-res[a.id].mo);
  const topAdds=byMo.slice(0,3);const topCuts=byMo.slice(-3).reverse();
  let regime;if(avgMo>1.0)regime=`Add ${topAdds.map(a=>a.short).join(', ')}`;else if(avgMo>0.5)regime=`OW ${topAdds[0].short} — UW ${topCuts[0].short}`;else if(avgMo>-0.5)regime=`Buy ${topAdds[0].short}, Sell ${topCuts[0].short}`;else if(avgMo>-1.25)regime=`Cut ${topCuts.map(a=>a.short).join(', ')}`;else regime=`Sell ${topCuts.map(a=>a.short).join(', ')} — Risk Off`;
  const impl=buildTopImplications(res,window._sortTF||'mo');
  let md=`**CAGAN CAPITAL POSITIONING** — ${new Date().toLocaleDateString()}\n\n`;
  md+=`**Regime:** ${regime} (z: ${avgMo.toFixed(2)} avg)\n\n`;
  md+=`**Top 3 Insights:**\n`;
  impl.forEach((im,i)=>md+=`${i+1}. **${im.title}** — ${im.detail}\n`);
  md+=`\n**Add:** ${topAdds.map(a=>`${a.short} (z: ${res[a.id].mo.toFixed(2)})`).join(', ')}\n`;
  md+=`**Cut:** ${topCuts.map(a=>`${a.short} (z: ${res[a.id].mo.toFixed(2)})`).join(', ')}\n`;
  md+=`\n_Auto-generated. Not financial advice._`;
  navigator.clipboard.writeText(md).then(()=>{
    const btn=document.getElementById('copy-md-btn');
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy as Markdown',1500);}
  }).catch(()=>alert('Copy failed — check clipboard permissions.'));
}

// ═══ WATCHLIST ═══
function getWatchlist(){
  try{return JSON.parse(localStorage.getItem('mktpos_watchlist')||'[]');}catch(e){return[];}
}
function toggleWatchlist(id){
  let wl=getWatchlist();
  if(wl.includes(id))wl=wl.filter(x=>x!==id);
  else if(wl.length<8)wl.push(id);
  try{localStorage.setItem('mktpos_watchlist',JSON.stringify(wl));}catch(e){}
  renderWatchlistBar();
  applyWatchlistFilter();
}
function renderWatchlistBar(){
  const el=document.getElementById('wl-bar');if(!el)return;
  const wl=getWatchlist();
  let html=`<span style="font-family:var(--mn);font-size:0.72em;color:var(--txd);text-transform:uppercase;letter-spacing:1px;">Watchlist</span>`;
  html+=`<button class="wl-chip${!wl.length?' active':''}" onclick="clearWatchlist()">All</button>`;
  ASSETS.forEach(a=>{
    const active=wl.includes(a.id);
    html+=`<button class="wl-chip${active?' active':''}" onclick="toggleWatchlist('${a.id}')" style="${active?'border-color:'+a.color+';':''}">${a.short}${active?'<span class="wl-x">×</span>':''}</button>`;
  });
  el.innerHTML=html;
}
function clearWatchlist(){
  try{localStorage.setItem('mktpos_watchlist','[]');}catch(e){}
  renderWatchlistBar();
  applyWatchlistFilter();
}
function applyWatchlistFilter(){
  const wl=getWatchlist();
  if(!wl.length){document.querySelectorAll('.hm-card').forEach(c=>c.style.display='');return;}
  document.querySelectorAll('.hm-card').forEach(c=>{c.style.display=wl.includes(c.dataset.id)?'':'none';});
}

// ═══ KEYBOARD NAVIGATION ═══
function initKeyboardNav(){
  const tabOrder=['overview','briefing','insights','crossasset','portfolio','narrative','correlation','backtest','export'];
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    // 1-6 for horizons
    if(e.key>='1'&&e.key<='6'&&!e.ctrlKey&&!e.metaKey){
      const tfs=['wk','mo','yr','y3','y5','y10'];
      setTF(tfs[parseInt(e.key)-1]);e.preventDefault();return;
    }
    // [ and ] for prev/next tab
    if(e.key==='['||e.key===']'){
      const current=tabOrder.find(id=>document.getElementById('pn-'+id)?.classList.contains('active'))||'overview';
      const idx=tabOrder.indexOf(current);
      const next=e.key===']'?tabOrder[Math.min(idx+1,tabOrder.length-1)]:tabOrder[Math.max(idx-1,0)];
      sw(next);e.preventDefault();return;
    }
    // T for theme toggle
    if(e.key==='t'&&!e.ctrlKey&&!e.metaKey){toggleTheme();e.preventDefault();}
    // M for markdown copy
    if(e.key==='m'&&!e.ctrlKey&&!e.metaKey){copyAsMarkdown();e.preventDefault();}
  });
}

  // US vs International
  const usIds=['sp500','iwm','vug','vtv','vym'].filter(id=>res[id]);
  const intlIds=['eem','efa','vymi','acwx'].filter(id=>res[id]);
  if(usIds.length&&intlIds.length){
    const usAvg=usIds.reduce((s,id)=>s+res[id].mo,0)/usIds.length;
    const intlAvg=intlIds.reduce((s,id)=>s+res[id].mo,0)/intlIds.length;
    const gap=usAvg-intlAvg;

      <div style="font-size:0.82em;color:var(--txd);line-height:1.7;">US avg z: ${usAvg.toFixed(2)} vs Intl avg z: ${intlAvg.toFixed(2)}. ${gap>0.75?'Overweight US — SPX and IWM over EEM/EFA. Fund intl cuts into domestic winners.':gap<-0.75?'Add international — EEM and EFA are catching up. Fund from weakest US names.':`Pick the strongest from each region. ${usAvg>=intlAvg?'US has a slight edge — lean domestic but diversify with the best intl name.':'Intl has a slight edge — add EEM or EFA alongside your US core.'}`}</div>
    </div>`;
  }

  // Dollar impact
  if(res.dxy){
    const dz=res.dxy.mo;
    html+=`<div style="padding:12px 16px;background:var(--s2);border-radius:8px;margin-bottom:10px;border-left:3px solid #005F9E;">
      <div style="font-weight:600;font-size:0.88em;color:var(--txb);margin-bottom:4px;">Dollar: ${sig(dz)} (z: ${dz.toFixed(2)})</div>
      <div style="font-size:0.82em;color:var(--txd);line-height:1.7;">${dz>0.5?'Strong dollar — trim GLD, EEM, and commodity exposure. DXY strength is a headwind for international and real assets.':dz<-0.5?'Weak dollar — add GLD, EEM, and commodities. DXY weakness is a tailwind for international and real assets.':'Dollar is range-bound — FX is not driving cross-asset returns. Focus positioning on asset-level signals.'} 1W: ${fp2(res.dxy.r1w)}</div>
    </div>`;
  }
  html+=`</div>`;

  // ── KEY HEADLINES ──
  const mktNews=allNews?._market||[];
  if(mktNews.length){
    html+=`<div class="c" style="margin-bottom:20px;"><div class="c-title">Market Headlines</div>`;
    html+=renderNewsHTML(mktNews,'var(--ac)','market');
    html+=`</div>`;
  }

  // ── MULTI-HORIZON SNAPSHOT ──
  const avgYr=available.reduce((s,a)=>s+(res[a.id].yr!=null?res[a.id].yr:res[a.id].mo),0)/available.length;
  const avgY3=available.reduce((s,a)=>s+(res[a.id].y3!=null?res[a.id].y3:res[a.id].mo),0)/available.length;
  const byYr=[...available].sort((a,b)=>(res[b.id].yr||res[b.id].mo)-(res[a.id].yr||res[a.id].mo));
  const hzSig=z=>z>1.0?'Risk-On':z>0.25?'Selective Add':z>-0.5?'Pair Trade':'Cut & Hedge';
  const hzC=z=>z>0.5?'c-up':z<-0.5?'c-dn':'c-wn';
  html+=`<div class="c" style="margin-bottom:20px;"><div class="c-title">Horizon Alignment</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;">
      <div style="padding:14px;background:var(--s2);border-radius:8px;text-align:center;">
        <div style="font-family:var(--mn);font-size:0.68em;color:var(--txd);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">This Week</div>
        <div style="font-family:var(--mn);font-size:1.1em;font-weight:700;" class="${hzC(avgWk)}">${hzSig(avgWk)}</div>
        <div style="font-family:var(--mn);font-size:0.78em;color:var(--txd);margin-top:4px;">z: ${avgWk.toFixed(2)}</div>
        <div style="font-size:0.78em;color:var(--txd);margin-top:4px;">Add: <span style="color:${byWk[0].color}">${byWk[0].short}</span></div>
      </div>
      <div style="padding:14px;background:var(--s2);border-radius:8px;text-align:center;border:1px solid var(--ac);">
        <div style="font-family:var(--mn);font-size:0.68em;color:var(--ac);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">This Month</div>
        <div style="font-family:var(--mn);font-size:1.1em;font-weight:700;" class="${hzC(avgMo)}">${hzSig(avgMo)}</div>
        <div style="font-family:var(--mn);font-size:0.78em;color:var(--txd);margin-top:4px;">z: ${avgMo.toFixed(2)}</div>
        <div style="font-size:0.78em;color:var(--txd);margin-top:4px;">Add: <span style="color:${byMo[0].color}">${byMo[0].short}</span></div>
      </div>
      <div style="padding:14px;background:var(--s2);border-radius:8px;text-align:center;">
        <div style="font-family:var(--mn);font-size:0.68em;color:var(--txd);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">This Year</div>
        <div style="font-family:var(--mn);font-size:1.1em;font-weight:700;" class="${hzC(avgYr)}">${hzSig(avgYr)}</div>
        <div style="font-family:var(--mn);font-size:0.78em;color:var(--txd);margin-top:4px;">z: ${avgYr.toFixed(2)}</div>
        <div style="font-size:0.78em;color:var(--txd);margin-top:4px;">Add: <span style="color:${byYr[0].color}">${byYr[0].short}</span></div>
      </div>
      <div style="padding:14px;background:var(--s2);border-radius:8px;text-align:center;">
        <div style="font-family:var(--mn);font-size:0.68em;color:var(--txd);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">3-Year</div>
        <div style="font-family:var(--mn);font-size:1.1em;font-weight:700;" class="${hzC(avgY3)}">${hzSig(avgY3)}</div>
        <div style="font-family:var(--mn);font-size:0.78em;color:var(--txd);margin-top:4px;">z: ${avgY3.toFixed(2)}</div>
      </div>
    </div>
    <p style="font-size:0.82em;color:var(--txd);margin-top:10px;line-height:1.6;">${Math.sign(avgWk)===Math.sign(avgMo)&&Math.sign(avgMo)===Math.sign(avgYr)?(avgMo>0?'All horizons confirm risk-on — add '+byMo[0].short+' with full conviction. Size aggressively.':'All horizons confirm defensive — cut '+byMo[byMo.length-1].short+' and raise cash across the board.'):'Horizons diverge: weekly is '+(avgWk>avgMo?'stronger — the short-term trend favors adding '+byWk[0].short+' tactically':'weaker — near-term momentum is fading, tighten stops on '+byWk[byWk.length-1].short)+'. Annual is '+(avgYr>avgMo?'more constructive — use dips to build positions in '+byYr[0].short:'more cautious — trim rallies and reduce risk on bounces')+'.'}</p>
  </div>`;

  // ── BOTTOM LINE ──
  html+=`<div style="padding:20px 24px;background:linear-gradient(135deg,rgba(0,156,220,0.06),rgba(58,159,216,0.04));border:1px solid rgba(0,156,220,0.15);border-radius:12px;margin-bottom:20px;">
    <div style="font-family:var(--mn);font-size:0.72em;color:var(--ac);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;">Bottom Line — Near-Term (Monthly)</div>
    <p style="font-size:1.02em;color:var(--txb);line-height:1.9;margin:0;">`;

  if(avgMo>1.0) html+=`Risk-on environment. Lead with <b style="color:${topAdds[0].color}">${topAdds[0].short}</b>, <b style="color:${topAdds[1].color}">${topAdds[1].short}</b>, and <b style="color:${topAdds[2].color}">${topAdds[2].short}</b>. ${bullN} of ${available.length} assets signal add — this is a market to be long. Cut ${topCuts[0].short} and ${topCuts[1].short} to fund adds. ${ob.length?'Watch overbought readings in '+ob.join(', ')+' for entry timing.':'Momentum is broad-based.'}`;

  else if(avgMo>-0.5) html+=`The best trade this month: buy <b style="color:${topAdds[0].color}">${topAdds[0].short}</b> (z: ${res[topAdds[0].id].mo.toFixed(2)}), sell <b style="color:${topCuts[0].color}">${topCuts[0].short}</b> (z: ${res[topCuts[0].id].mo.toFixed(2)}). ${topAdds[1]?topAdds[1].short+' is a secondary add. ':''}Express the spread between leaders and laggards. ${os.length?'Oversold entry opportunity: '+os.join(', ')+'.':'Size for the conviction level — this is a relative value market.'}`;
  else if(avgMo>-1.25) html+=`Headwinds building. Cut <b style="color:${topCuts[0].color}">${topCuts[0].short}</b>, <b style="color:${topCuts[1].color}">${topCuts[1].short}</b>, and <b style="color:${topCuts[2].color}">${topCuts[2].short}</b>. ${bearN} assets signal reduce. Only ${topAdds[0].short} offers relative safety. Raise cash, tighten stops.`;
  else html+=`Defensive posture. Reduce exposure aggressively across ${bearN} assets signaling sell. ${topCuts.map(a=>`<b style="color:${a.color}">${a.short}</b>`).join(', ')} are the weakest. Capital preservation is priority one.`;

  html+=`</p></div>`;

  html+=`<div style="text-align:center;font-family:var(--mn);font-size:0.72em;color:var(--txd);padding:16px 0;">Generated ${now.toLocaleString()} · Algorithmically synthesized · Not financial advice</div>`;
  html+=`</div>`;
  return html;
}

function reoptimize(){
  const maxWt=parseInt(document.getElementById('maxWtSlider')?.value||25)/100;
  const minWt=parseInt(document.getElementById('minWtSlider')?.value||5)/100;
  const maxPos=parseInt(document.getElementById('maxPosSlider')?.value||10);
  const temp=parseFloat(document.getElementById('tempSlider')?.value||3);
  function optT(results,scoreKey,mxW,mnW,mxPos,excl){
    let items=ASSETS.filter(a=>results[a.id]&&!excl.has(a.id)).map(a=>{
      // Vol-adjusted score: divide signal by annualized vol (risk-adjusted return proxy)
      const cl=results[a.id].closesAll;let vol=0.2;
      if(cl&&cl.length>30){const rets=[];for(let i=Math.max(1,cl.length-60);i<cl.length;i++)rets.push((cl[i]-cl[i-1])/cl[i-1]);const mn=rets.reduce((s,v)=>s+v,0)/rets.length;const vr=rets.reduce((s,v)=>s+(v-mn)**2,0)/rets.length;vol=Math.sqrt(vr)*Math.sqrt(252)||0.2;}
      const rawScore=results[a.id][scoreKey];
      const adjScore=rawScore/(vol*5+0.5); // Risk-adjusted: penalize high vol
      return{id:a.id,name:a.short,fullName:a.name,color:a.color,cat:a.cat,sentType:a.sentType,score:rawScore,adjScore,vol};
    });
    if(!items.length)return{allocs:[],exp:0};
    // Asset-class diversification: ensure no single asset class dominates selection
    // Guarantee at least 2 asset classes represented if possible
    items.sort((a,b)=>b.adjScore-a.adjScore);
    if(items.length>mxPos){
      const selected=[];const classCounts={};
      const AC_MAX_PCT=0.6; // No single class > 60% of positions
      const maxPerClass=Math.max(2,Math.ceil(mxPos*AC_MAX_PCT));
      for(const it of items){
        if(selected.length>=mxPos)break;
        const ac=assetClass(it);
        classCounts[ac]=(classCounts[ac]||0);
        if(classCounts[ac]<maxPerClass){selected.push(it);classCounts[ac]++;}
      }
      // If we haven't filled all slots, add remaining regardless of class
      if(selected.length<mxPos){
        for(const it of items){
          if(selected.length>=mxPos)break;
          if(!selected.includes(it))selected.push(it);
        }
      }
      items=selected;
    }
    // Softmax allocation with vol-adjusted scores
    const shifted=items.map(it=>({...it,exp:Math.exp(it.adjScore*temp)}));
    const totE=shifted.reduce((s,it)=>s+it.exp,0);
    let wts=shifted.map(it=>({...it,w:it.exp/totE}));
    // Apply position limits and asset-class concentration limits
    const AC_WT_MAX=0.55; // No single class > 55% of portfolio weight
    for(let iter=0;iter<40;iter++){
      let changed=false;
      wts.forEach(w=>{if(w.w>mxW){w.w=mxW;changed=true;}});
      if(mnW>0&&items.length*mnW<=1)wts.forEach(w=>{if(w.w<mnW){w.w=mnW;changed=true;}});
      // Asset-class weight cap
      const acWts={};wts.forEach(w=>{const ac=assetClass(w);acWts[ac]=(acWts[ac]||0)+w.w;});
      for(const[ac,aw] of Object.entries(acWts)){
        if(aw>AC_WT_MAX){
          const acItems=wts.filter(w=>assetClass(w)===ac);
          const scale=AC_WT_MAX/aw;
          acItems.forEach(w=>{w.w*=scale;changed=true;});
        }
      }
      if(!changed)break;
      const tot2=wts.reduce((s,w)=>s+w.w,0);wts=wts.map(w=>({...w,w:w.w/tot2}));
    }
    const tot=wts.reduce((s,w)=>s+w.w,0);wts=wts.map(w=>({...w,w:w.w/tot}));
    // Calculate portfolio-level risk metrics
    const portVol=Math.sqrt(wts.reduce((s,w)=>s+(w.w**2)*(w.vol**2),0)); // Simplified (ignores correlations)
    const portScore=wts.reduce((s,w)=>s+w.w*w.score,0);
    return{allocs:wts.sort((a,b)=>b.w-a.w),exp:portScore,portVol,
      riskBudget:wts.map(w=>({name:w.name,riskContrib:((w.w**2)*(w.vol**2))})).sort((a,b)=>b.riskContrib-a.riskContrib)};
  }
  const res=window._res,excl=window._excluded;if(!res)return;
  const portMap={};
  const hzns=[['wk','1-Week Tactical','1-week'],['mo','1-Month Swing','1-month'],['yr','1-Year Strategic','1-year'],['y3','3-Year Secular','3-year'],['y5','5-Year Structural','5-year'],['y10','10-Year Generational','10-year']];
  hzns.forEach(([k])=>{portMap[k]=optT(res,k,maxWt,minWt,maxPos,excl);});
  const wl=`Max ${(maxWt*100).toFixed(0)}% / Min ${(minWt*100).toFixed(0)}% | ${maxPos} positions | Temp ${temp.toFixed(1)}`;
  const el=document.getElementById('portResults');if(!el)return;
  // Destroy ALL existing portfolio charts first
  Object.keys(window._ci).filter(k=>k.startsWith('dn-')).forEach(k=>{try{window._ci[k].destroy();}catch(e){}delete window._ci[k];});
  // Build portfolio construction commentary
  const moP=portMap.mo,yrP=portMap.yr;
  let commentary=buildPortfolioCommentary(res,moP,yrP,excl);
  // Render horizons + commentary
  let horizonHTML='';
  hzns.forEach(([k,label,horizon])=>{horizonHTML+=renderPortHorizon(portMap[k],label,k,wl,horizon);});
  el.innerHTML=commentary+horizonHTML;
  // Create new charts with retry for visibility
  function createCharts(){
    hzns.forEach(([k])=>{
      const cvs=document.getElementById('dn-'+k);if(!cvs)return;
      const ctx=cvs.getContext('2d');if(!ctx)return;
      // Ensure canvas has dimensions (Chart.js fails silently on 0-size canvas)
      if(cvs.offsetWidth===0||cvs.offsetHeight===0){cvs.style.width='100%';cvs.style.height='200px';}
      const p=portMap[k];
      window._ci['dn-'+k]=new Chart(ctx,{type:'doughnut',data:{labels:p.allocs.map(a=>a.name),datasets:[{data:p.allocs.map(a=>(a.w*100).toFixed(1)),backgroundColor:p.allocs.map(a=>a.color),borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{titleFont:{family:'JetBrains Mono',size:13},bodyFont:{family:'JetBrains Mono',size:12},callbacks:{label:c=>c.label+': '+c.parsed+'%'}}}}});
    });
  }
  // Use requestAnimationFrame for reliable chart creation after DOM paint
  requestAnimationFrame(()=>requestAnimationFrame(createCharts));
}

    // Convert composite scores to cross-sectional Z-scores
    const zTFs=['wk','mo','yr','y3','y5','y10'];
    const zIds=ASSETS.filter(a=>res[a.id]).map(a=>a.id);
    zTFs.forEach(tf=>{
      const vals=zIds.map(id=>res[id][tf]).filter(v=>v!=null);
      const mean=vals.reduce((s,v)=>s+v,0)/vals.length;
      const std=Math.sqrt(vals.reduce((s,v)=>s+(v-mean)**2,0)/vals.length)||0.01;
      zIds.forEach(id=>{if(res[id][tf]!=null){res[id]['_raw_'+tf]=res[id][tf];res[id][tf]=(res[id][tf]-mean)/std;}});
    });

    // Fetch news in parallel (non-blocking — render dashboard first with empty news, then fill in)
    stat('loading headlines...');
    const allNews = {_market: []};
    // Start news fetches
    const newsPromises = [
      fetchNews('stock market outlook economy').then(n => { allNews._market = n; }),
      ...ASSETS.filter(a => res[a.id]).map(a => fetchNews(a.newsQ, 5).then(n => { allNews[a.id] = n; }))
    ];

    // Render dashboard immediately with whatever news we have
    // Use Promise.allSettled so we don't block on failures
    try {
      await Promise.race([Promise.allSettled(newsPromises), new Promise(r => setTimeout(r, 8000))]);
    } catch(e) { console.warn('news timeout', e); }

    renderDash(res, allNews);

    // Continue fetching any remaining news in background and update DOM
    Promise.allSettled(newsPromises).then(() => {
      // Update top news section
      const topEl = document.getElementById('topNews');
      if (topEl && allNews._market.length) {
        topEl.innerHTML = `<div class="news-section"><h3>Key Takeaways</h3>${renderNewsHTML(allNews._market, 'var(--ac)', 'broad market')}</div>`;
      }
      // Update per-asset news sections
      ASSETS.forEach(a => {
        const el = document.getElementById('news-'+a.id);
        if (el && allNews[a.id]?.length) {
          el.outerHTML = renderNewsHTML(allNews[a.id], a.color, a.name);
        }
      });
      window._allNews = allNews;
    });

  }catch(e){document.getElementById('loading').innerHTML=`<div class="err"><strong>Error:</strong> ${e.message}<br><br>1. Check internet<br>2. Try Chrome/Firefox<br>3. Disable ad blockers/VPNs<br>4. Wait & retry</div><button class="btn" onclick="location.reload()" style="margin-top:14px">Retry</button>`;console.error(e);}
}
main();
</script>
</body>
</html>
